<body>
<script>
/* =====================================================================
   CONFIG
   ===================================================================== */
const CONFIG = {
  // Direct CSV export of your sheet (works as long as the sheet's Share
  // setting is "Anyone with the link → Viewer" — it does NOT need to be
  // separately "Published to web"). gid=0 is the first tab (Foaie1).
  // If you add more tabs and need a different one, grab its gid from the
  // tab's URL (…#gid=123456) and swap it in below.
  SHEET_CSV_URL: "https://docs.google.com/spreadsheets/d/1Xv5az4DrAtOV8zyeSAkpjZVTWWB8QWJI1DJybvPY7HM/export?format=csv&gid=0",
  TEAM_NAME: "Shadow Greenville Roleplay",
  BRAND_COLOR: "#258162",
  LOGO_URL: "https://github.com/okfait/okgarage-mini/blob/main/01%20(81).png?raw=true"
};
// Fetches the "LogHistory" tab by NAME instead of by gid, so it keeps
// working even though that tab was created later and its gid is unknown.
const SHEET_ID_MATCH = CONFIG.SHEET_CSV_URL.match(/\/d\/([a-zA-Z0-9-_]+)/);
const SHEET_ID = SHEET_ID_MATCH ? SHEET_ID_MATCH[1] : '';
const LOG_HISTORY_CSV_URL = SHEET_ID ? `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=LogHistory` : '';

/* Rank ladder — highest to lowest. Your sheet now has a "Rank" row
   (row 4) per host — put one of these exact names in that cell and the
   card picks it up automatically. ASSIGN below is only a fallback for
   any host whose Rank cell is still blank. */
const RANKS = [
  { name:"Host Manager",   group:"Management",        info:["Oversees and manages the Server Host department.","Reviews applications.","Handles reports."] },
  { name:"Host Lead",      group:"Management",        info:["Assists the Host Manager in department management.","Handles reports."] },
  { name:"Host Supervisor",group:"Management",        info:["Issues warnings to Hosts.","Assists Host Team members in everyday situations.","Handpicked by the Host Manager."] },
  { name:"Senior Host",    group:"Host Operations",   info:["Gains GIF permissions in citizen chat.","Attains BVE Level 2.","Gains image permissions in citizen chat."] },
  { name:"Host",           group:"Host Operations",   info:["Drives a dark blue undercover vehicle with a \"HOST\" plate.","Manages messages and is exempt from channel cooldowns.","Attains BVE Level 1.","Obtains advanced session permissions (requires Advanced Citizenship)."] },
  { name:"Junior Host",    group:"Host Operations",   info:["Has passed Trial Host training and progressed to the next stage.","Begins learning session hosting and management skills.","Drives a dark blue undercover vehicle with a \"J-HOST\" plate.","Obtains independent hosting permissions."] },
  { name:"Trial Host",     group:"Probationary Hosts",info:["The first stage of becoming a host.","Undergoes basic training in hosting fundamentals.","Takes grammar and spelling tests.","Assigned a Server Host Trainer for guidance.","Hosts a supervised session upon completing fundamental training.","Drives a dark blue undercover vehicle with a \"T-HOST\" plate.","Can co-host sessions once 2 steps of training are complete."] }
];
// Fallback only — used if a host's Rank cell in the sheet is blank.
const ASSIGN = { "GeoYT2010": "Host Manager" };

/* Inline SVG icons — no external font/network request, so they can
   never fail to load the way the Google Material Symbols font did. */
const ICONS = {
  moon:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>',
  sun:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>',
  chart: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>',
  group: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
  crown: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7Z"/><path d="M5 20h14"/></svg>'
};
</script>

<style>
:root{
  --bg:#0b1210;
  --bg-elevated:#111b17;
  --bg-card:#111c18;
  --line:#1e2d27;
  --line-bright:#2c443a;
  --accent:#258162;
  --accent-bright:#3ddc97;
  --accent-gold:#e8b84b;
  --accent-danger:#d9605a;
  --text:#f2f5f3;
  --text-muted:#93a89f;
  --text-dim:#5c6f68;
  --header-bg:rgba(11,18,16,0.55);
  --header-border:rgba(44,68,58,0.5);
  --font-display:'Poppins',sans-serif;
  --font-body:'Inter',sans-serif;
}
[data-theme="light"]{
  --bg:#f3f6f4;
  --bg-elevated:#ffffff;
  --bg-card:#ffffff;
  --line:#dfe7e2;
  --line-bright:#c7d5cd;
  --text:#0f1a16;
  --text-muted:#5c6f68;
  --text-dim:#8a998f;
  --header-bg:rgba(255,255,255,0.7);
  --header-border:rgba(199,213,205,0.7);
}
[data-theme="light"] body{
  background:
    radial-gradient(ellipse at top, rgba(37,129,98,0.08), transparent 55%),
    var(--bg);
}
[data-theme="light"] #login-screen{
  background:
    repeating-linear-gradient(0deg, rgba(37,129,98,0.05) 0px, rgba(37,129,98,0.05) 1px, transparent 1px, transparent 3px),
    var(--bg);
}
*{box-sizing:border-box;}
html{ scrollbar-width:none; -ms-overflow-style:none; }
html::-webkit-scrollbar{ display:none; width:0; height:0; }
body{
  margin:0; padding:0;
  background:
    radial-gradient(ellipse at top, rgba(37,129,98,0.10), transparent 55%),
    var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  font-weight:400;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
body::-webkit-scrollbar{ display:none; width:0; height:0; }
::selection{ background:var(--accent); color:#fff; }
@media (prefers-reduced-motion: reduce){ *{ animation-duration:0.001ms !important; transition-duration:0.001ms !important; } }

.eyebrow{ font-family:var(--font-body); font-size:11px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-dim); }
.roster-head-right{ display:flex; align-items:center; gap:14px; }
.roster-search-pill{ display:flex; align-items:center; gap:8px; background:var(--bg-elevated); border:1px solid var(--line-bright); border-radius:999px; padding:8px 14px; transition:border-color .15s; }
.roster-search-pill:focus-within{ border-color:var(--accent-bright); }
.roster-search-pill .search-icon{ width:14px; height:14px; flex-shrink:0; color:var(--text-dim); }
.roster-search-pill input{ border:none; outline:none; background:transparent; color:var(--text); font-family:var(--font-body); font-size:12.5px; width:130px; }
.roster-search-pill input::placeholder{ color:var(--text-dim); }
.card.search-hidden{ display:none; }

.icon{ display:inline-flex; width:18px; height:18px; flex-shrink:0; vertical-align:middle; }
.icon svg{ width:100%; height:100%; display:block; }

/* ---------- shine sweep, used on a few key headings ---------- */
.shiny-text{
  background-image:linear-gradient(120deg, currentColor 0%, currentColor 35%, #ffffff 50%, currentColor 65%, currentColor 100%);
  background-size:220% auto;
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  animation:shineSweep 3.4s linear infinite;
}
@keyframes shineSweep{ 0%{ background-position:150% center; } 100%{ background-position:-50% center; } }

/* ---------- ported ElectricBorder canvas effect ---------- */
.electric-wrap{ position:relative; height:100%; }
.electric-wrap > .card{ height:100%; }
.electric-canvas{ position:absolute; pointer-events:none; z-index:0; }

/* ---------- LOGIN ---------- */
#loading-screen{
  position:fixed; inset:0; z-index:70; display:flex; align-items:center; justify-content:center;
  background:var(--bg); transition:opacity .35s ease;
}
.loading-inner{ display:flex; flex-direction:column; align-items:center; gap:20px; }
.loading-logo-wrap{ position:relative; width:100px; height:100px; display:flex; align-items:center; justify-content:center; }
.loading-logo-wrap img{ width:60px; height:60px; object-fit:contain; }
.logo-img{ opacity:0; transition:opacity .25s; }
.logo-img.loaded{ opacity:1; }
.loading-spinner{ position:absolute; inset:0; width:100%; height:100%; animation:loadSpin 1.1s linear infinite; }
.loading-spinner circle{ fill:none; stroke:var(--accent-bright); stroke-width:4; stroke-linecap:round; stroke-dasharray:170 400; }
@keyframes loadSpin{ to{ transform:rotate(360deg); } }
.loading-text{ font-family:var(--font-display); font-weight:600; font-size:12.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); }

#login-screen{
  position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center;
  background:
    repeating-linear-gradient(0deg, rgba(37,129,98,0.035) 0px, rgba(37,129,98,0.035) 1px, transparent 1px, transparent 3px),
    var(--bg);
  overflow:hidden;
}
#login-screen::before, #login-screen::after{
  content:""; position:absolute; width:170vmax; height:170vmax; border-radius:50%;
  filter:blur(90px); pointer-events:none; will-change:transform;
}
#login-screen::before{
  top:-85vmax; left:-85vmax;
  background:radial-gradient(circle, rgba(61,220,151,0.16), transparent 62%);
  animation:driftA 20s ease-in-out infinite alternate;
}
#login-screen::after{
  bottom:-85vmax; right:-85vmax;
  background:radial-gradient(circle, rgba(37,129,98,0.18), transparent 62%);
  animation:driftB 24s ease-in-out infinite alternate;
}
@keyframes driftA{ 0%{ transform:translate(0,0) scale(1); } 100%{ transform:translate(6vmax,5vmax) scale(1.08); } }
@keyframes driftB{ 0%{ transform:translate(0,0) scale(1); } 100%{ transform:translate(-6vmax,-5vmax) scale(1.08); } }
.login-card{ position:relative; z-index:1; width:min(380px, 90vw); background:var(--bg-card); border:1px solid var(--line-bright); border-radius:20px; padding:36px 30px 28px; box-shadow:0 30px 80px rgba(0,0,0,0.55); }
.login-badge{ width:auto; height:104px; margin:0 auto 18px; display:flex; align-items:center; justify-content:center; }
.login-badge img{ height:100%; width:auto; max-width:220px; object-fit:contain; filter:drop-shadow(0 10px 26px rgba(0,0,0,0.45)); }
.login-title{ font-family:var(--font-display); font-weight:700; font-size:22px; text-align:center; letter-spacing:-0.01em; margin:0 0 26px; }
.field{ margin-bottom:14px; }
.field label{ display:block; font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-muted); margin-bottom:6px; }
.field input{ width:100%; padding:12px 14px; border-radius:11px; background:var(--bg-elevated); border:1px solid var(--line-bright); color:var(--text); font-family:var(--font-body); font-size:14.5px; outline:none; transition:border-color .15s, box-shadow .15s; }
.field input:focus{ border-color:var(--accent-bright); box-shadow:0 0 0 3px rgba(61,220,151,0.15); }
@keyframes onAutoFillStart{ from{ opacity:1; } to{ opacity:1; } }
@keyframes onAutoFillCancel{ from{ opacity:1; } to{ opacity:1; } }
.field input:-webkit-autofill{ animation-name:onAutoFillStart; animation-duration:0.1s; }
.field input:not(:-webkit-autofill){ animation-name:onAutoFillCancel; animation-duration:0.1s; }
#login-btn{ width:100%; margin-top:8px; padding:14px; border:none; border-radius:11px; background:linear-gradient(135deg, var(--accent-bright), var(--accent)); color:#04140d; font-family:var(--font-display); font-weight:700; font-size:15px; letter-spacing:0.01em; cursor:pointer; transition:transform .12s, box-shadow .12s; }
#login-btn:hover{ transform:translateY(-1px); box-shadow:0 8px 24px rgba(61,220,151,0.25); }
#login-error{ margin-top:12px; font-size:12.5px; color:var(--accent-danger); text-align:center; min-height:14px; }

/* ---------- APP SHELL ---------- */
#app{ display:none; }
.app-content{ max-width:1180px; margin:0 auto; padding:112px 24px 60px; }

header.top{
  position:fixed; top:0; left:0; right:0; z-index:40;
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 24px; gap:16px;
  background:var(--header-bg);
  -webkit-backdrop-filter:blur(18px) saturate(140%);
  backdrop-filter:blur(18px) saturate(140%);
  border-bottom:1px solid var(--header-border);
  box-shadow:0 4px 24px rgba(15,26,22,0.06);
}
header.top .top-inner{ max-width:1180px; width:100%; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
.brand{ display:flex; align-items:center; gap:13px; }
.brand-mark{ height:46px; width:auto; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.brand-mark img{ height:100%; width:auto; max-width:200px; object-fit:contain; }
.brand-text .name{ font-family:var(--font-display); font-weight:700; font-size:19px; line-height:1.15; letter-spacing:-0.01em; }
.who{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.who .name{ font-size:13px; color:var(--text-muted); }
.who .name b{ color:var(--text); font-weight:600; }
#logout-btn{ background:transparent; border:1px solid var(--line-bright); color:var(--text-muted); font-size:11.5px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; padding:9px 14px; border-radius:10px; cursor:pointer; transition:.15s; font-family:var(--font-body); }
#logout-btn:hover{ border-color:var(--accent-danger); color:var(--accent-danger); }

.topnav{ display:flex; align-items:center; gap:4px; }
.topnav a{ display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:600; color:var(--text-muted); text-decoration:none; padding:8px 12px; border-radius:9px; transition:.15s; font-family:var(--font-body); }
.topnav a:hover{ color:var(--accent-bright); background:var(--bg-elevated); }

#theme-toggle{ display:inline-flex; align-items:center; justify-content:center; width:36px; height:36px; background:var(--bg-elevated); border:1px solid var(--line-bright); color:var(--text-muted); border-radius:10px; cursor:pointer; transition:.15s; flex-shrink:0; }
#theme-toggle:hover{ border-color:var(--accent-bright); color:var(--accent-bright); }

section.section{ margin-bottom:40px; scroll-margin-top:100px; }
.section-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:10px; }
.section-title{ font-family:var(--font-display); font-weight:700; font-size:14px; letter-spacing:0.08em; text-transform:uppercase; color:var(--accent-bright); }

/* ---------- LOGS PILL ---------- */
.logs-label{ text-align:center; font-family:var(--font-display); font-weight:800; font-size:30px; letter-spacing:0.02em; color:var(--accent-bright); margin-bottom:16px; }
.pill-wrap{ display:flex; flex-direction:column; align-items:center; gap:10px; }
.pill-track{ position:relative; width:100%; max-width:640px; height:44px; border-radius:999px; background:var(--bg-elevated); border:1px solid var(--line-bright); overflow:visible; margin:0 auto; }
.pill-fill{ position:absolute; top:0; left:0; bottom:0; width:0%; border-radius:999px; background:linear-gradient(90deg, var(--accent), var(--accent-bright)); transition:width 0.9s cubic-bezier(.2,.8,.2,1); overflow:hidden; }
.pill-value{ position:absolute; left:16px; top:0; bottom:0; display:flex; align-items:center; font-family:var(--font-display); font-weight:700; font-size:16px; color:#04140d; z-index:2; }
.pill-value.on-track{ color:var(--text); }
.pill-promo .tip{ color:var(--accent-bright); }
.pill-marker{ position:absolute; top:-20px; bottom:-20px; width:34px; margin-left:-17px; z-index:3; cursor:pointer; }
.pill-marker::before{ content:""; position:absolute; top:20px; bottom:20px; left:50%; width:2px; transform:translateX(-50%); background:var(--accent-gold); box-shadow:0 0 8px rgba(232,184,75,0.7); }
.pill-marker .marker-num{ position:absolute; top:0; left:50%; transform:translateX(-50%); font-size:12px; font-weight:700; color:var(--accent-gold); white-space:nowrap; }
.tip-box{ position:absolute; bottom:calc(100% + 12px); left:50%; transform:translateX(-50%); background:var(--bg-card); border:1px solid var(--line-bright); border-radius:10px; padding:9px 13px; font-size:12.5px; font-weight:600; white-space:nowrap; opacity:0; pointer-events:none; transition:opacity .15s, transform .15s; box-shadow:0 10px 26px rgba(0,0,0,0.4); z-index:5; }
.tip-box::after{ content:""; position:absolute; top:100%; left:50%; transform:translateX(-50%); border:6px solid transparent; border-top-color:var(--bg-card); }
.pill-marker:hover .tip-box, .pill-promo:hover .tip-box{ opacity:1; transform:translateX(-50%) translateY(-3px); }
.pill-marker .tip-box{ color:var(--accent-gold); }
.pill-promo{ position:absolute; right:0; top:-20px; bottom:-20px; display:flex; align-items:center; padding:0 16px 0 24px; font-family:var(--font-display); font-weight:700; font-size:16px; color:var(--text-muted); z-index:2; cursor:pointer; }
.pill-promo .tip-box{ color:var(--accent-bright); left:auto; right:0; transform:none; }
.pill-promo:hover .tip-box{ transform:translateY(-3px); }
.pill-caption{ font-size:12.5px; color:var(--text-dim); text-align:center; }
.quota-soon{ display:flex; align-items:center; gap:10px; font-size:13px; color:var(--text-dim); margin-top:6px; }
.dots{ display:flex; gap:4px; }
.dots span{ width:5px; height:5px; border-radius:50%; background:var(--accent-bright); animation:bob 1s ease-in-out infinite; }
.dots span:nth-child(2){ animation-delay:.15s; } .dots span:nth-child(3){ animation-delay:.3s; }
@keyframes bob{ 0%,100%{ transform:translateY(0); opacity:.4;} 50%{ transform:translateY(-4px); opacity:1;} }

/* ---------- GRAPH CONTROLS ---------- */
.graph-controls{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.toggle-pill{ display:inline-flex; align-items:center; gap:9px; background:var(--bg-elevated); border:1px solid var(--line-bright); color:var(--text-muted); font-size:12.5px; font-weight:600; padding:9px 16px 9px 10px; border-radius:999px; cursor:pointer; transition:.15s; font-family:var(--font-body); }
.toggle-pill .dot{ width:14px; height:14px; border-radius:50%; border:2px solid var(--line-bright); background:transparent; transition:.2s; flex-shrink:0; }
.toggle-pill:hover{ border-color:var(--line-bright); color:var(--text); }
.toggle-pill.active{ color:var(--text); border-color:var(--accent-bright); }
.toggle-pill.active .dot{ background:var(--accent-bright); border-color:var(--accent-bright); box-shadow:0 0 8px rgba(61,220,151,.6); }

.dropdown{ position:relative; }
.dropdown-toggle{ display:inline-flex; align-items:center; gap:8px; background:var(--bg-elevated); border:1px solid var(--line-bright); color:var(--text); font-size:12.5px; font-weight:600; padding:9px 16px; border-radius:999px; cursor:pointer; font-family:var(--font-body); transition:.15s; }
.dropdown-toggle:hover{ border-color:var(--accent-bright); }
.dropdown-toggle .chev{ font-size:9px; color:var(--text-dim); transition:transform .15s; }
.dropdown.open .dropdown-toggle .chev{ transform:rotate(180deg); }
.dropdown-menu{ position:absolute; top:calc(100% + 8px); left:0; min-width:200px; max-height:280px; overflow-y:auto; background:var(--bg-card); border:1px solid var(--line-bright); border-radius:14px; padding:6px; box-shadow:0 20px 50px rgba(0,0,0,0.45); opacity:0; pointer-events:none; transform:translateY(-6px); transition:opacity .15s, transform .15s; z-index:10; scrollbar-width:none; -ms-overflow-style:none; }
.dropdown-search{ width:100%; box-sizing:border-box; margin-bottom:6px; padding:8px 10px; background:var(--bg-elevated); border:1px solid var(--line-bright); border-radius:9px; color:var(--text); font-family:var(--font-body); font-size:12px; outline:none; }
.dropdown-search:focus{ border-color:var(--accent-bright); }
.dropdown-search::placeholder{ color:var(--text-dim); }
.dropdown-menu::-webkit-scrollbar{ display:none; width:0; height:0; }
.dropdown.open .dropdown-menu{ opacity:1; pointer-events:auto; transform:translateY(0); }
.dropdown-item{ padding:9px 12px; border-radius:9px; font-size:12.5px; font-weight:500; color:var(--text-muted); cursor:pointer; transition:.1s; }

/* ---------------- Drag-to-resize the graph, with a magnetic snap back
   to its default height when released close to it ---------------- */
(function(){
  const box = document.getElementById('chart-box');
  const handle = document.getElementById('chart-resize');
  const DEFAULT_H = 340, MIN_H = 340, MAX_H = 900, SNAP_THRESHOLD = 28;
  let startY = 0, startH = 0, dragging = false;

  function onMove(e){
    if(!dragging) return;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    const h = Math.max(MIN_H, Math.min(MAX_H, startH + (y - startY)));
    box.style.height = h + 'px';
    if(CHART) CHART.resize();
    e.preventDefault();
  }
  function onUp(){
    if(!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.removeProperty('cursor');
    const cur = box.getBoundingClientRect().height;
    if(Math.abs(cur - DEFAULT_H) <= SNAP_THRESHOLD){
      box.style.transition = 'height .5s cubic-bezier(.34,1.56,.64,1)';
      box.style.height = DEFAULT_H + 'px';
      setTimeout(()=>{ box.style.transition = ''; if(CHART) CHART.resize(); }, 500);
    }
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('mouseup', onUp);
    window.removeEventListener('touchmove', onMove);
    window.removeEventListener('touchend', onUp);
  }
  function onDown(e){
    dragging = true;
    box.style.transition = '';
    handle.classList.add('dragging');
    document.body.style.cursor = 'ns-resize';
    startY = e.touches ? e.touches[0].clientY : e.clientY;
    startH = box.getBoundingClientRect().height;
    window.addEventListener('mousemove', onMove, { passive:false });
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchmove', onMove, { passive:false });
    window.addEventListener('touchend', onUp);
    e.preventDefault();
  }
  handle.addEventListener('mousedown', onDown);
  handle.addEventListener('touchstart', onDown, { passive:false });
})();

/* ---------------- ported ElectricBorder (canvas noise outline) ---------------- */
function attachElectricBorder(target, { color = '#3ddc97', speed = 1, chaos = 0.06, borderRadius = 16, opacity = 1 } = {}){
  const borderOffset = 14;
  const wrap = document.createElement('div');
  wrap.className = 'electric-wrap';
  target.parentNode.insertBefore(wrap, target);
  const canvas = document.createElement('canvas');
  canvas.className = 'electric-canvas';
  wrap.appendChild(canvas);
  wrap.appendChild(target);

  const ctx = canvas.getContext('2d');
  let width = 0, height = 0, timeVal = 0, lastTime = 0, rafId = 0;

  function random(x){ return (Math.sin(x * 12.9898) * 43758.5453) % 1; }
  function noise2D(x, y){
    const i = Math.floor(x), j = Math.floor(y), fx = x - i, fy = y - j;
    const a = random(i + j * 57), b = random(i + 1 + j * 57), c = random(i + (j + 1) * 57), d = random(i + 1 + (j + 1) * 57);
    const ux = fx * fx * (3 - 2 * fx), uy = fy * fy * (3 - 2 * fy);
    return a * (1 - ux) * (1 - uy) + b * ux * (1 - uy) + c * (1 - ux) * uy + d * ux * uy;
  }
  function octavedNoise(x, octaves, lacunarity, gain, baseAmp, baseFreq, t, seed){
    let y = 0, amp = baseAmp, freq = baseFreq;
    for(let i = 0; i < octaves; i++){
      y += amp * noise2D(freq * x + seed * 100, t * freq * 0.3);
      freq *= lacunarity; amp *= gain;
    }
    return y;
  }
  function cornerPt(cx, cy, r, startA, arc, p){ const a = startA + p * arc; return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) }; }
  function roundRectPt(t, left, top, w, h, r){
    const sw = w - 2 * r, sh = h - 2 * r, arc = (Math.PI * r) / 2, total = 2 * sw + 2 * sh + 4 * arc;
    let dist = t * total, acc = 0;
    if(dist <= acc + sw){ const p = (dist - acc) / sw; return { x: left + r + p * sw, y: top }; } acc += sw;
    if(dist <= acc + arc){ const p = (dist - acc) / arc; return cornerPt(left + w - r, top + r, r, -Math.PI/2, Math.PI/2, p); } acc += arc;
    if(dist <= acc + sh){ const p = (dist - acc) / sh; return { x: left + w, y: top + r + p * sh }; } acc += sh;
    if(dist <= acc + arc){ const p = (dist - acc) / arc; return cornerPt(left + w - r, top + h - r, r, 0, Math.PI/2, p); } acc += arc;
    if(dist <= acc + sw){ const p = (dist - acc) / sw; return { x: left + w - r - p * sw, y: top + h }; } acc += sw;
    if(dist <= acc + arc){ const p = (dist - acc) / arc; return cornerPt(left + r, top + h - r, r, Math.PI/2, Math.PI/2, p); } acc += arc;
    if(dist <= acc + sh){ const p = (dist - acc) / sh; return { x: left, y: top + h - r - p * sh }; } acc += sh;
    const p = (dist - acc) / arc; return cornerPt(left + r, top + r, r, Math.PI, Math.PI/2, p);
  }

  function updateSize(){
    const rect = target.getBoundingClientRect();
    width = rect.width + borderOffset * 2;
    height = rect.height + borderOffset * 2;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = width * dpr; canvas.height = height * dpr;
    canvas.style.width = width + 'px'; canvas.style.height = height + 'px';
    canvas.style.left = (-borderOffset) + 'px'; canvas.style.top = (-borderOffset) + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  updateSize();

  function draw(now){
    rafId = requestAnimationFrame(draw);
    if(!lastTime) lastTime = now;
    const dt = (now - lastTime) / 1000; lastTime = now;
    timeVal += dt * speed;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = opacity;
    ctx.strokeStyle = color; ctx.lineWidth = 1.4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.shadowColor = color; ctx.shadowBlur = 7 * opacity;
    const left = borderOffset, top = borderOffset, bw = width - 2 * borderOffset, bh = height - 2 * borderOffset;
    if(bw <= 0 || bh <= 0) return;
    const maxR = Math.min(bw, bh) / 2, r = Math.min(borderRadius, maxR);
    const perim = 2 * (bw + bh) + 2 * Math.PI * r;
    const samples = Math.max(24, Math.floor(perim / 3));
    ctx.beginPath();
    for(let i = 0; i <= samples; i++){
      const p = i / samples;
      const pt = roundRectPt(p, left, top, bw, bh, r);
      const xn = octavedNoise(p * 8, 6, 1.6, 0.7, chaos, 10, timeVal, 0);
      const yn = octavedNoise(p * 8, 6, 1.6, 0.7, chaos, 10, timeVal, 1);
      const dx = pt.x + xn * 60, dy = pt.y + yn * 60;
      if(i === 0) ctx.moveTo(dx, dy); else ctx.lineTo(dx, dy);
    }
    ctx.closePath(); ctx.stroke();
  }
  rafId = requestAnimationFrame(draw);
  const ro = new ResizeObserver(updateSize);
  ro.observe(target);

  return {
    destroy(){
      cancelAnimationFrame(rafId); ro.disconnect();
      if(wrap.parentNode){ wrap.parentNode.insertBefore(target, wrap); wrap.remove(); }
    }
  };
}
function shadeColor(hex, percent){
  // percent negative = darker, positive = lighter
  const n = parseInt(hex.replace('#',''), 16);
  let r = (n >> 16) + Math.round(255 * percent / 100);
  let g = ((n >> 8) & 0xff) + Math.round(255 * percent / 100);
  let b = (n & 0xff) + Math.round(255 * percent / 100);
  r = Math.max(0, Math.min(255, r)); g = Math.max(0, Math.min(255, g)); b = Math.max(0, Math.min(255, b));
  return '#' + (0x1000000 + r*0x10000 + g*0x100 + b).toString(16).slice(1);
}
let ELECTRIC_INSTANCES = [];
function clearElectricBorders(){ ELECTRIC_INSTANCES.forEach(i=>i.destroy()); ELECTRIC_INSTANCES = []; }

/* ---------------- count-up numbers ---------------- */
function countUp(el, target, duration = 900){
  if(!el) return;
  const startTime = performance.now();
  const isInt = Number.isInteger(target);
  function tick(now){
    const p = Math.min((now - startTime) / duration, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    const val = target * eased;
    el.textContent = isInt ? Math.round(val) : val.toFixed(1);
    if(p < 1) requestAnimationFrame(tick); else el.textContent = isInt ? target : target.toFixed(1);
  }
  requestAnimationFrame(tick);
}

function num(v){
  if(v===undefined || v===null) return null;
  const s = String(v).trim();
  if(s==='') return null;
  // A misformatted sheet cell (a Logs cell that got auto-converted to a
  // date somewhere along the way) shows up here as text like "02.05.2026"
  // or "31.12.1899" — that's not a real log count, so treat it as unusable
  // instead of silently mangling it into some other number.
  if(/^\d{1,2}[.\/]\d{1,2}[.\/]\d{2,4}$/.test(s)) return null;
  const n = parseFloat(s.replace(/[^0-9.\-]/g,''));
  return isNaN(n) ? null : n;
}
function parseDate(s){
  if(!s) return null;
  const parts = String(s).trim().split('/');
  if(parts.length!==3) return null;
  const [d,m,y] = parts.map(x=>parseInt(x,10));
  if(!d||!m||!y) return null;
  const dt = new Date(y, m-1, d);
  return isNaN(dt.getTime()) ? null : dt;
}
function shortLabel(dstr){
  const p = dstr.split('/');
  if(p.length!==3) return dstr;
  return `${p[0]}/${p[1]}/${p[2].slice(-2)}`;
}

function parseSheetRows(rows){
  const out = { sameRankQuota:null, promoQuota:null, motm:[], users:[] };
  if(rows.length < 2) return out;

  out.sameRankQuota = num(rows[1] && rows[1][1]);
  out.promoQuota = num(rows[2] && rows[2][1]);

  for(let r=6; r<rows.length; r++){
    const row = rows[r];
    if(!row) continue;
    const uname = (row[0]||'').trim();
    if(!uname) continue;
    out.motm.push({ username:uname, logs:num(row[1]), date:(row[2]||'').trim() });
  }

  // Shared date column = E (index 4). Collect every row where E parses as a date.
  const dateRows = [];
  for(let r=0; r<rows.length; r++){
    const row = rows[r];
    if(!row) continue;
    const dstr = (row[4]||'').trim();
    const d = parseDate(dstr);
    if(d) dateRows.push({ r, dstr, d });
  }
  dateRows.sort((a,b)=>a.d-b.d);

  // Each user occupies one column starting at F (index 5):
  // row0=username, row1=password, row2=pfp, row3=rank, then log values aligned to dateRows.
  const header = rows[0] || [];
  const maxCols = Math.max(header.length, (rows[1]||[]).length, (rows[2]||[]).length, (rows[3]||[]).length);
  for(let c=5; c<maxCols; c++){
    const username = ((rows[0]||[])[c] || '').trim();
    if(!username) continue;
    const password = ((rows[1]||[])[c] || '').trim();
    const pfp = ((rows[2]||[])[c] || '').trim();
    const rankName = ((rows[3]||[])[c] || '').trim();
    const entries = dateRows.map(dr => {
      const raw = num((rows[dr.r]||[])[c]);
      return { date:dr.d, dstr:dr.dstr, value: raw===null ? 0 : raw, has: raw!==null };
    });
    out.users.push({ username, password, pfp, rankName, entries });
  }
  out.motm.forEach(m=>{
    const u = out.users.find(x=>x.username.toLowerCase()===m.username.toLowerCase());
    m.pfp = u ? u.pfp : '';
  });
  return out;
}

/* ================= "New" sheet layout (Host Team Records) =================
   Instead of hardcoding cell letters, this hunts for the actual header
   text ("Username", "Rank", "Logs", "LOA", …) wherever it lives, so it
   keeps working if a row/column ever shifts. Log HISTORY doesn't live on
   this sheet at all anymore — the Apps Script archives it to a separate
   "LogHistory" tab (Date, Username, Logs) every time you click
   "Save & Clear Today's Logs", so that's fetched and merged in separately. */
function findLabelCell(rows, label, startRow=0){
  const target = label.trim().toLowerCase();
  for(let r=startRow;r<rows.length;r++){
    const row = rows[r]||[];
    for(let c=0;c<row.length;c++){
      if(((row[c]||'')+'').trim().toLowerCase() === target) return { r, c };
    }
  }
  return null;
}
function valueRightOf(rows, pos, maxGap=4){
  if(!pos) return null;
  const row = rows[pos.r]||[];
  for(let c=pos.c+1; c<=pos.c+maxGap && c<row.length; c++){
    const v = ((row[c]||'')+'').trim();
    if(v) return v;
  }
  return null;
}
const WORD_NUM = { one:1, two:2, three:3, four:4, five:5, six:6, seven:7, eight:8, nine:9, ten:10 };
const WARN_RING_R = 27;
const WARN_RING_CIRC = 2 * Math.PI * WARN_RING_R;
// Builds the avatar + LOA/warning ring markup for a roster card: the pfp's
// own border turns gold for LOA, and a separate outer arc (not touching
// the pfp border) fills in 1/3 at a time per warning, going full-circle +
// pulsing for a suspension. Hovering shows a tooltip above it.
function pfpRingHtml(u){
  const initials = u.username.slice(0,2).toUpperCase();
  const inner = u.pfp ? `<img class="pfp" src="${u.pfp}" alt="${u.username}">` : `<div class="pfp fallback">${initials}</div>`;
  const warnRaw = (u.warnLabel||'').trim().toLowerCase();
  const isSuspended = warnRaw === 'suspended';
  const warnN = WORD_NUM[warnRaw] || null;
  let ringSvg = '';
  if(isSuspended){
    ringSvg = `<svg class="warn-ring" viewBox="0 0 60 60"><circle class="warn-ring-arc suspended" cx="30" cy="30" r="${WARN_RING_R}" stroke-dasharray="${WARN_RING_CIRC} ${WARN_RING_CIRC}"/></svg>`;
  } else if(warnN){
    // Each warning is drawn as its OWN separate arc in its own 1/3 slot of
    // the circle (with a gap baked in before the next slot), rather than
    // one continuous arc — so 2 warnings visibly reads as two distinct
    // pieces, not a bigger single arc.
    const slotLen = WARN_RING_CIRC / 3;
    const gap = 9;
    const dashLen = slotLen - gap;
    const circles = [];
    for(let i=0; i<warnN; i++){
      circles.push(`<circle class="warn-ring-arc" cx="30" cy="30" r="${WARN_RING_R}" stroke-dasharray="${dashLen} ${WARN_RING_CIRC-dashLen}" stroke-dashoffset="${-(i*slotLen)}"/>`);
    }
    ringSvg = `<svg class="warn-ring" viewBox="0 0 60 60">${circles.join('')}</svg>`;
  }
  let tipText = isSuspended ? 'Suspended' : (warnN ? `${warnN} Warning${warnN>1?'s':''}` : '');
  if(u.loaInfo) tipText = tipText ? `${tipText} · ${u.loaInfo}` : u.loaInfo;
  else if(u.loa) tipText = tipText ? `${tipText} · On LOA` : 'On LOA';
  const tipHtml = tipText ? `<div class="tip-box pfp-tip">${tipText}</div>` : '';
  return `<div class="pfp-ring-wrap${u.loa ? ' has-loa' : ''}">${ringSvg}${inner}${tipHtml}</div>`;
}
// Parses an LOA cell like "12days 8/3/26" or "14 days 8/3/2026" into a
// tooltip that says how many days it was for and how many days are left,
// computed live against today's date rather than baked in from the sheet.
function parseLoaCell(raw){
  if(!raw) return null;
  const m = raw.match(/^(\d+)\s*days?\s+(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/i);
  if(!m) return null;
  const days = parseInt(m[1], 10);
  let [, , dd, mm, yy] = m;
  dd = parseInt(dd,10); mm = parseInt(mm,10); yy = parseInt(yy,10);
  if(yy < 100) yy += 2000;
  // End-of-day on the given date, so "ends in X hours/minutes" is meaningful
  // right up until it actually lapses, not just whole calendar days.
  const endMoment = new Date(yy, mm-1, dd, 23, 59, 59);
  if(isNaN(endMoment.getTime())) return null;
  const diffMs = endMoment - new Date();
  let endsText;
  if(diffMs <= 0){
    const agoMs = Math.abs(diffMs);
    const agoDays = Math.floor(agoMs / 86400000);
    endsText = agoDays >= 1 ? `ended ${agoDays} day${agoDays===1?'':'s'} ago` : 'ended';
  } else if(diffMs >= 86400000){
    const d = Math.floor(diffMs / 86400000);
    endsText = `ends in ${d} day${d===1?'':'s'}`;
  } else if(diffMs >= 3600000){
    const h = Math.floor(diffMs / 3600000);
    endsText = `ends in ${h} hour${h===1?'':'s'}`;
  } else {
    const mins = Math.max(1, Math.floor(diffMs / 60000));
    endsText = `ends in ${mins} minute${mins===1?'':'s'}`;
  }
  return `LOA for ${days} day${days===1?'':'s'} — ${endsText}`;
}
function parseNewFormat(rows){
  const out = { sameRankQuota:null, promoQuota:null, motm:[], users:[] };

  const sameRankPos = findLabelCell(rows, 'Logs for keeping the rank') || findLabelCell(rows, 'Logs for same rank');
  const promoPos = findLabelCell(rows, 'Logs for promotion');
  out.sameRankQuota = num(valueRightOf(rows, sameRankPos));
  out.promoQuota = num(valueRightOf(rows, promoPos));

  // Roster header: a row containing "Username", with "Rank" a few columns after it.
  let headerPos = null;
  for(let r=0;r<rows.length;r++){
    const row = rows[r]||[];
    const uc = row.findIndex(v=>((v||'')+'').trim().toLowerCase()==='username');
    if(uc===-1) continue;
    const rc = row.findIndex((v,ci)=> ci>uc && ci<=uc+8 && ((v||'')+'').trim().toLowerCase()==='rank');
    if(rc!==-1){ headerPos = { r, colUsername:uc, colRank:rc }; break; }
  }
  if(!headerPos){
    console.warn('SGR Host Database: could not find a "Username"+"Rank" header row anywhere in the sheet — New-format parsing failed.');
    return out; // new layout not found — caller falls back to Old
  }

  const headerRow = rows[headerPos.r] || [];
  function colOnHeader(...labels){
    for(const label of labels){
      const i = headerRow.findIndex(v=>((v||'')+'').trim().toLowerCase()===label.toLowerCase());
      if(i!==-1) return i;
    }
    return null;
  }
  const colPassword = colOnHeader('Password');
  const colPfp = colOnHeader('ProfilePic', 'ProfilePicLink', 'Profile Pic');
  const colLOA = colOnHeader('LOA');
  const colWarn = colOnHeader('Amount of warnings');
  // "Eligible for payment" is intentionally never read — not used anywhere.
  console.log(`SGR Host Database: found roster header at row ${headerPos.r+1}, columns — username:${headerPos.colUsername} rank:${headerPos.colRank} password:${colPassword} pfp:${colPfp} loa:${colLOA} warn:${colWarn}`);

  for(let r=headerPos.r+1; r<rows.length; r++){
    const row = rows[r]||[];
    const username = ((row[headerPos.colUsername]||'')+'').trim();
    const rankName = ((row[headerPos.colRank]||'')+'').trim();
    // A section banner ("Department HR", "Host Of The Month", …) is a merged
    // cell — its text lands in the username column but the rank column next
    // to it is blank, which a real host row never is. That's how we tell
    // the difference instead of hardcoding row ranges (which would break
    // the moment you insert/delete a row).
    if(!username || !rankName || username.toLowerCase()==='username') continue;
    const password = colPassword!==null ? ((row[colPassword]||'')+'').trim() : '';
    const pfp = colPfp!==null ? ((row[colPfp]||'')+'').trim() : '';
    const loaRaw = colLOA!==null ? ((row[colLOA]||'')+'').trim() : '';
    const warnRaw = colWarn!==null ? ((row[colWarn]||'')+'').trim() : '';
    out.users.push({
      username, password, pfp, rankName,
      loa: !!loaRaw && loaRaw.toLowerCase()!=='n/a',
      loaInfo: parseLoaCell(loaRaw),
      warnLabel: (warnRaw && warnRaw.toLowerCase()!=='none') ? warnRaw : '',
      entries: [] // filled in by applyLogHistory() once the LogHistory tab loads
    });
  }
  console.log(`SGR Host Database: parsed ${out.users.length} host(s):`,
    out.users.map(u => `${u.username} (rank: ${u.rankName || 'none'}, password ${u.password ? 'set' : 'MISSING'})`));

  // New-layout Host Of The Month table has its own Logs/Username/Date
  // sub-header. Search starts AFTER the roster header, not from row 0 —
  // otherwise this can latch onto the old section's own "Host Of The
  // Month" label further up the sheet instead of the new one.
  const motmBanner = findLabelCell(rows, 'Host Of The Month', headerPos.r);
  if(motmBanner){
    let sub = null;
    for(let r=motmBanner.r; r<Math.min(motmBanner.r+6, rows.length); r++){
      const row = rows[r]||[];
      const li = row.findIndex(v=>((v||'')+'').trim().toLowerCase()==='logs');
      const ui = row.findIndex(v=>((v||'')+'').trim().toLowerCase()==='username');
      const di = row.findIndex(v=>((v||'')+'').trim().toLowerCase()==='date');
      if(li!==-1 && ui!==-1 && di!==-1){ sub = { r, li, ui, di }; break; }
    }
    if(sub){
      for(let r=sub.r+1; r<rows.length; r++){
        const row = rows[r]||[];
        const uname = ((row[sub.ui]||'')+'').trim();
        if(!uname || uname.toLowerCase()==='username') continue;
        const matchedUser = out.users.find(u=>u.username.toLowerCase()===uname.toLowerCase());
        out.motm.push({ username:uname, logs:num(row[sub.li]), date:((row[sub.di]||'')+'').trim(), pfp: matchedUser ? matchedUser.pfp : '' });
      }
    }
  }
  return out;
}
function applyLogHistory(sheetObj, historyRows){
  const dataRows = historyRows.filter(r => r && r.length>=3 && (r[0]||'').trim() && (r[0]||'').trim().toLowerCase()!=='date');
  const dateMap = {};
  dataRows.forEach(r=>{
    const dstr = (r[0]||'').trim();
    const d = parseDate(dstr);
    if(d) dateMap[dstr] = d;
  });
  const dateList = Object.keys(dateMap).map(dstr=>({ dstr, d:dateMap[dstr] })).sort((a,b)=>a.d-b.d);
  sheetObj.users.forEach(u=>{
    const byDate = {};
    dataRows.forEach(r=>{
      if(((r[1]||'')+'').trim().toLowerCase() !== u.username.toLowerCase()) return;
      const v = num(r[2]);
      if(v!==null) byDate[(r[0]||'').trim()] = v;
    });
    u.entries = dateList.map(dr => ({ date:dr.d, dstr:dr.dstr, value: byDate[dr.dstr] || 0, has: Object.prototype.hasOwnProperty.call(byDate, dr.dstr) }));
  });
}

function totalLogs(user){ return user.entries.reduce((s,e)=>s+e.value,0); }
function statusFor(total){
  const sr = SHEET.sameRankQuota, pr = SHEET.promoQuota;
  if(sr===null || pr===null) return { cls:'', label:'Quota pending' };
  if(total < sr) return { cls:'status-danger', label:'Below quota' };
  if(total < pr) return { cls:'status-hold', label:'Same rank' };
  return { cls:'status-promo', label:'Promotion' };
}
function rankFor(user){
  let name = user.rankName;
  if(!name){
    const key = Object.keys(ASSIGN).find(k=>k.toLowerCase()===user.username.toLowerCase());
    name = key ? ASSIGN[key] : '';
  }
  const idx = RANKS.findIndex(r=>r.name.toLowerCase()===String(name).toLowerCase());
  return idx===-1 ? { order:RANKS.length, rank:null } : { order:idx, rank:RANKS[idx] };
}

// Remember-me — stored ourselves in localStorage instead of relying on
// the browser's native password manager, since that's inconsistent or
// missing entirely on phones and in-app browsers (Discord's built-in
// browser, for example). localStorage works the same everywhere.
const REMEMBER_KEY = 'sgr_remember_v1';
function saveRemembered(u, p){ try{ localStorage.setItem(REMEMBER_KEY, JSON.stringify({ u, p })); }catch(e){} }
function clearRemembered(){ try{ localStorage.removeItem(REMEMBER_KEY); }catch(e){} }
function loadRemembered(){
  try{ const raw = localStorage.getItem(REMEMBER_KEY); return raw ? JSON.parse(raw) : null; }
  catch(e){ return null; }
}

function attemptLogin(silent){
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  const match = SHEET.users.find(x => x.username.toLowerCase()===u.toLowerCase() && x.password===p);

  errEl.textContent = '';
  saveRemembered(u, p);
  CURRENT_USER = match;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('who-name').textContent = match.username;

/* ---- Browser "save password" + return-visit autofill autologin ---- */
(function(){
  const userEl = document.getElementById('login-user');
  const passEl = document.getElementById('login-pass');
  let userFilled = false, passFilled = false, fired = false;
  function maybeAutoLogin(){
    if(fired || !userFilled || !passFilled) return;
    if(!userEl.value.trim() || !passEl.value) return;
    fired = true;
    setTimeout(()=>{ if(document.getElementById('login-screen').style.display !== 'none') attemptLogin(); }, 250);
  }
  [[userEl,'user'],[passEl,'pass']].forEach(([el,which])=>{
    el.addEventListener('animationstart', (e)=>{
      if(e.animationName !== 'onAutoFillStart') return;
      if(which==='user') userFilled = true; else passFilled = true;
      maybeAutoLogin();
    });
  });
})();

/* ---------------- RENDER: GRAPH ---------------- */
function allDatesSorted(){
  const set = new Map();
  SHEET.users.forEach(u=>u.entries.forEach(e=>set.set(e.dstr, e.date)));
  return [...set.entries()].sort((a,b)=>a[1]-b[1]).map(x=>x[0]);
}
function lastActiveDateIndex(dates){
  for(let i=dates.length-1;i>=0;i--){
    const dstr = dates[i];
    if(SHEET.users.some(u=>u.entries.some(e=>e.dstr===dstr && e.has))) return i;
  }
  return -1;
}
function cumulativeSeries(user, dates){
  let running = 0; const map = {};
  user.entries.forEach(e=>{ map[e.dstr] = e.value; });
  return dates.map(d=>{ running += (map[d]||0); return running; });
}
// Bright, unmistakable primaries first (red, orange, yellow, green, blue,
// purple, pink); once those run out, cycle the same hues again at a
// different lightness/saturation/slight hue-shift so extra users still
// get a visually distinct color instead of repeating an exact one.
const BASE_HUES = [4, 28, 48, 152, 205, 262, 322];
function colorForIndex(i){
  const hue = BASE_HUES[i % BASE_HUES.length];
  const pass = Math.floor(i / BASE_HUES.length);
  const hueShift = (pass * 11) % 30;
  const sat = Math.max(38, 74 - pass * 6);
  const light = pass === 0 ? 58 : (pass % 2 === 1 ? 42 : 70) ;
  return `hsl(${(hue + hueShift) % 360} ${sat}% ${light}%)`;
}

function withAlpha(color, alpha){
  return color.replace(/\)\s*$/, ` / ${alpha})`);
}
function renderChart(){
  const box = document.querySelector('#graph-section .chart-box');
  if(typeof Chart === 'undefined'){
    box.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);font-size:13px;text-align:center;padding:20px;">Chart library failed to load — check your ad blocker / extensions, or your connection, then refresh.</div>';
    console.error('SGR Host Database: Chart.js is not defined — both CDN sources failed to load.');
    return;
  }
  if(!document.getElementById('logs-chart')){
    box.innerHTML = '<canvas id="logs-chart"></canvas>';
  }
  const cs = getComputedStyle(document.documentElement);
  const cDim = cs.getPropertyValue('--text-dim').trim() || '#5c6f68';
  const cCard = cs.getPropertyValue('--bg-card').trim() || '#111c18';
  const cLine = cs.getPropertyValue('--line').trim() || '#1e2d27';
  const cLineBright = cs.getPropertyValue('--line-bright').trim() || '#2c443a';

  let dates = allDatesSorted();
  const lastIdx = lastActiveDateIndex(dates);
  dates = lastIdx >= 0 ? dates.slice(0, lastIdx + 1) : [];

  const labels = dates.map(shortLabel);
  const datasets = SHEET.users.map((u,i)=>({
    label:u.username, data:cumulativeSeries(u, dates),
    borderColor:colorForIndex(i), backgroundColor:colorForIndex(i),
    pointStyle:'circle', pointRadius:0, pointHoverRadius:6, borderWidth:2.5, tension:0.25,
    _baseColor:colorForIndex(i)
  }));
  // Fixed axis ceiling based on EVERYONE's data, not just whoever is
  // currently visible — otherwise "show only me" rescales the whole graph.
  const overallMax = datasets.reduce((m,ds)=>Math.max(m, ...ds.data, 0), 0);
  const yMax = Math.ceil(overallMax) + 1;

  if(CHART) CHART.destroy();
  const ctx = document.getElementById('logs-chart').getContext('2d');
  CHART = new Chart(ctx, {
    type:'line',
    data:{ labels, datasets },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'nearest', intersect:false },
      plugins:{
        legend:{ display:false },
        tooltip:{
          backgroundColor:cCard, borderColor:cLineBright, borderWidth:1, padding:10,
          titleFont:{ family:"'Inter'", size:11.5, weight:'600' }, bodyFont:{ family:"'Inter'", size:11.5 },
          yAlign:'bottom', xAlign:'center',
          callbacks:{ label:(ctx)=>` ${ctx.dataset.label}: ${ctx.formattedValue} logs` }
        }
      },
      scales:{
        y:{ beginAtZero:true, max:yMax, ticks:{ stepSize:1, color:cDim, font:{ family:"'Inter'", size:10.5 } }, grid:{ color:cLine } },
        x:{ ticks:{ color:cDim, font:{ family:"'Inter'", size:10.5 } }, grid:{ display:false } }
      },
      onHover:(evt, active)=>{
        if(!active.length){ stopShine(); return; }
        // 'nearest' mode always returns SOMETHING as long as the cursor is
        // inside the chart area, even if it's nowhere near an actual line —
        // so only count it if the cursor is genuinely close to that point.
        const el = active[0].element;
        const dx = evt.x - el.x, dy = evt.y - el.y;
        if(Math.sqrt(dx*dx + dy*dy) > 26){ stopShine(); return; }
        startShine(active[0].datasetIndex);
      }
    }
  });
  document.getElementById('logs-chart').addEventListener('mouseleave', stopShine);

  // Custom HTML legend — the canvas-drawn one couldn't guarantee perfectly
  // round swatches at every zoom/DPR, so this is plain CSS circles instead.
  const legendEl = document.getElementById('chart-legend');
  legendEl.innerHTML = datasets.map((ds,i)=>
    `<span class="chart-legend-item" data-idx="${i}" data-name="${ds.label}"><span class="dot" style="background:${ds._baseColor}"></span>${ds.label}</span>`
  ).join('');
  legendEl.querySelectorAll('.chart-legend-item').forEach(item=>{
    const idx = +item.dataset.idx;
    item.addEventListener('mouseenter', ()=> startShine(idx));
    item.addEventListener('mouseleave', stopShine);
    item.addEventListener('click', ()=> toggleSelected(item.dataset.name));
  });

  const menu = document.getElementById('dropdown-menu');
  menu.innerHTML =
    `<input type="text" class="dropdown-search" id="dropdown-search" placeholder="Search players…">` +
    `<div class="dropdown-item" data-val="">All players</div>` +
    SHEET.users.map(u=>`<div class="dropdown-item" data-val="${u.username}">${u.username}</div>`).join('');
  menu.querySelectorAll('.dropdown-item').forEach(item=>{
    item.addEventListener('click', (e)=>{
      e.stopPropagation();
      if(item.dataset.val === '') clearSelection();
      else toggleSelected(item.dataset.val);
    });
  });
  const searchInput = document.getElementById('dropdown-search');
  searchInput.addEventListener('input', ()=>{
    const q = searchInput.value.trim().toLowerCase();
    menu.querySelectorAll('.dropdown-item').forEach(item=>{
      const isAll = item.dataset.val === '';
      item.style.display = (isAll || item.textContent.toLowerCase().includes(q)) ? '' : 'none';
    });
  });
  searchInput.addEventListener('click', (e)=> e.stopPropagation());
  refreshSelectionUI();
  applySelectionStyle();
}

/* ---------------- Shimmer sweep on the hovered graph line ----------------
   Mirrors the .shiny-text CSS effect (a moving bright band), but built on
   a canvas gradient since a line stroke can't use background-clip:text. */
let SHINE_IDX = -1, SHINE_RAF = null, SHINE_PHASE = 0;
function shineGradient(ctx, chartArea, baseColor, phase){
  const grad = ctx.createLinearGradient(chartArea.left, 0, chartArea.right, 0);
  const peak = (phase % 1.6) - 0.3; // sweeps in from the left, out past the right, loops
  const band = 0.16;
  const stops = [[0, baseColor], [1, baseColor]];
  [peak - band, peak, peak + band].forEach((o, i)=>{
    if(o > 0.001 && o < 0.999) stops.push([o, i===1 ? '#ffffff' : baseColor]);
  });
  const seen = new Set();
  stops.sort((a,b)=>a[0]-b[0]).forEach(([o,c])=>{
    let oo = Math.min(1, Math.max(0, o));
    while(seen.has(oo.toFixed(4))) oo += 0.0002;
    seen.add(oo.toFixed(4));
    grad.addColorStop(oo, c);
  });
  return grad;
}
function startShine(idx){
  if(!CHART) return;
  if(SHINE_IDX === idx && SHINE_RAF) return;
  SHINE_IDX = idx;
  document.querySelectorAll('.chart-legend-item').forEach((el,i)=>{
    el.classList.toggle('dimmed', i!==idx);
    el.classList.toggle('shiny-text', i===idx);
  });
  if(SHINE_RAF) return; // loop already running, it'll pick up the new idx
  function tick(){
    if(!CHART || SHINE_IDX === -1){ SHINE_RAF = null; return; }
    SHINE_PHASE += 0.02;
    CHART.data.datasets.forEach((ds,i)=>{
      if(i===SHINE_IDX){
        const grad = shineGradient(CHART.ctx, CHART.chartArea, ds._baseColor, SHINE_PHASE);
        ds.borderColor = grad; ds.backgroundColor = grad;
      } else {
        const dim = withAlpha(ds._baseColor, 0.2);
        ds.borderColor = dim; ds.backgroundColor = dim;
      }
    });
    CHART.update('none');
    SHINE_RAF = requestAnimationFrame(tick);
  }
  tick();
}
function stopShine(){
  SHINE_IDX = -1;
  SHINE_RAF = null;
  document.querySelectorAll('.chart-legend-item').forEach(el=> el.classList.remove('dimmed','shiny-text'));
  applySelectionStyle();
}
// Safety net: if the mouse leaves the chart/legend fast enough that Chart.js's
// own mouseleave never fires (common when flicking onto a roster card),
// this catches it on the very next mousemove anywhere else on the page.
document.addEventListener('mousemove', (e)=>{
  if(SHINE_IDX === -1) return;
  if(e.target.closest('#logs-chart') || e.target.closest('.chart-legend-item')) return;
  stopShine();
});
// Selected usernames are "pinned": solid + full color. Everyone else, if
// any pin is active, is dimmed AND switched to a dashed line — still
// visible, just clearly secondary. Empty selection = show everyone normal.
function selectionLabel(){
  if(SELECTED_SET.size === 0) return 'All players';
  if(SELECTED_SET.size === 1) return [...SELECTED_SET][0];
  return `${SELECTED_SET.size} selected`;
}
function toggleSelected(username){
  if(SELECTED_SET.has(username)) SELECTED_SET.delete(username);
  else SELECTED_SET.add(username);
  refreshSelectionUI();
  applySelectionStyle();
}
function clearSelection(){
  SELECTED_SET.clear();
  refreshSelectionUI();
  applySelectionStyle();
}
function refreshSelectionUI(){
  const toggleBtn = document.getElementById('dropdown-toggle');
  if(toggleBtn) toggleBtn.innerHTML = `<span>${selectionLabel()} <span class="chev">▾</span></span>`;
  document.querySelectorAll('.dropdown-item').forEach(item=>{
    const val = item.dataset.val;
    item.classList.toggle('selected', val === '' ? SELECTED_SET.size===0 : SELECTED_SET.has(val));
  });
  document.querySelectorAll('.chart-legend-item').forEach(item=>{
    item.classList.toggle('pinned', SELECTED_SET.has(item.dataset.name));
  });
  const onlyBtn = document.getElementById('only-me-btn');
  if(onlyBtn && CURRENT_USER) onlyBtn.classList.toggle('active', SELECTED_SET.has(CURRENT_USER.username));
}
function applySelectionStyle(){
  if(!CHART) return;
  CHART.data.datasets.forEach(ds=>{
    if(SELECTED_SET.size === 0 || SELECTED_SET.has(ds.label)){
      ds.borderColor = ds._baseColor; ds.backgroundColor = ds._baseColor;
    } else {
      const dim = withAlpha(ds._baseColor, 0.2);
      ds.borderColor = dim; ds.backgroundColor = dim;
    }
  });
  CHART.update('none');
}
document.getElementById('only-me-btn').addEventListener('click', function(){
  if(CURRENT_USER) toggleSelected(CURRENT_USER.username);
});
document.getElementById('dropdown-toggle').addEventListener('click', (e)=>{
  e.stopPropagation();
  document.getElementById('player-dropdown').classList.toggle('open');
});
document.addEventListener('click', ()=>{
  document.getElementById('player-dropdown').classList.remove('open');
});

/* ---------------- THEME (persisted light/dark) ---------------- */
const THEME_KEY = 'sgr-theme';
function setTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  try{ localStorage.setItem(THEME_KEY, t); }catch(e){}
  document.getElementById('theme-toggle').innerHTML = t === 'light'
    ? `<span class="icon">${ICONS.sun}</span>`
    : `<span class="icon">${ICONS.moon}</span>`;
  if(CURRENT_USER){ renderChart(); renderCards(); renderMotm(); }
}
document.getElementById('theme-toggle').addEventListener('click', ()=>{
  const current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  setTheme(current === 'light' ? 'dark' : 'light');
});
setTheme(document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark');

/* ---------------- RENDER: CARDS ---------------- */
function renderCards(){
  clearElectricBorders();
  const grid = document.getElementById('cards-grid');
  document.getElementById('roster-caption').textContent = `${SHEET.users.length} hosts`;
  const sorted = [...SHEET.users].sort((a,b)=>{
    const ra = rankFor(a).order, rb = rankFor(b).order;
    if(ra!==rb) return ra-rb;
    return totalLogs(b) - totalLogs(a);
  });
  const maxTotal = SHEET.users.reduce((m,u)=>Math.max(m, totalLogs(u)), 0);
  grid.innerHTML = sorted.map((u,i)=>{
    const total = totalLogs(u);
    const st = statusFor(total);
    const isTop = maxTotal > 0 && total === maxTotal;
    const isYou = CURRENT_USER && u.username.toLowerCase() === CURRENT_USER.username.toLowerCase();
    const { rank } = rankFor(u);
    const infoHtml = rank ? `<div class="card-info"><ul>${rank.info.map(x=>`<li>${x}</li>`).join('')}</ul><div class="card-hr"></div></div>` : '';
    return `
      <div class="card ${st.cls}${isYou?' is-you':''}" data-idx="${i}" data-rank="${rank ? rank.name : ''}" data-username="${u.username.toLowerCase()}" data-top="${isTop?'1':''}">
        <div class="card-top">
          ${pfpRingHtml(u)}
          <div><div class="card-name">${u.username}</div><div class="card-rank">${rank ? rank.name : 'Unranked'}</div></div>
        </div>
        <div class="card-hr"></div>
        ${infoHtml}
        <div class="card-logs ${isTop ? 'top-logger shiny-text' : ''}">${total}<span class="unit">logs</span></div>
      </div>`;
  }).join('');

  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  const brand = CONFIG.BRAND_COLOR;
  const cs = getComputedStyle(document.documentElement);
  const gold = cs.getPropertyValue('--accent-gold').trim() || '#e8b84b';
  const glowOpacity = isLight ? 0.5 : 1;
  grid.querySelectorAll('.card').forEach(card=>{
    const rankName = card.dataset.rank;
    if(card.dataset.top === '1'){
      ELECTRIC_INSTANCES.push(attachElectricBorder(card, { color: gold, chaos:0.06, borderRadius:16, opacity: glowOpacity }));
    } else if(rankName === 'Host Manager' || rankName === 'Host Lead'){
      ELECTRIC_INSTANCES.push(attachElectricBorder(card, { color: brand, chaos:0.06, borderRadius:16, opacity: glowOpacity }));
    }
  });
  applyRosterSearch();
}
function applyRosterSearch(){
  const input = document.getElementById('roster-search');
  if(!input) return;
  const q = input.value.trim().toLowerCase();
  document.querySelectorAll('#cards-grid .card').forEach(card=>{
    card.classList.toggle('search-hidden', !!q && !card.dataset.username.includes(q));
  });
}
document.getElementById('roster-search').addEventListener('input', applyRosterSearch);

/* ---------------- RENDER: HOST OF THE MONTH ---------------- */
function renderMotm(){
  const el = document.getElementById('motm-list');
  if(!SHEET.motm.length){ el.innerHTML = `<div class="eyebrow">No entries yet.</div>`; return; }
  const cs = getComputedStyle(document.documentElement);
  const gold = cs.getPropertyValue('--accent-gold').trim() || '#e8b84b';
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  el.innerHTML = SHEET.motm.map((m)=>{
    const initials = m.username.slice(0,2).toUpperCase();
    const pfpHtml = m.pfp ? `<img class="pfp" src="${m.pfp}" alt="${m.username}">` : `<div class="pfp fallback">${initials}</div>`;
    return `
    <div class="motm-card">
      <div class="motm-card-top">
        ${pfpHtml}
        <div><div class="motm-card-name">${m.username}</div><div class="motm-card-date">${m.date||''}</div></div>
      </div>
      <div class="card-hr"></div>
      <div class="motm-card-logs">${m.logs ?? '—'}<span class="unit">logs</span></div>
    </div>`;
  }).join('');
  el.querySelectorAll('.motm-card').forEach(card=>{
    ELECTRIC_INSTANCES.push(attachElectricBorder(card, { color: gold, chaos:0.06, borderRadius:16, opacity: isLight ? 0.5 : 1 }));
  });
}

function renderAll(){ renderPill(); renderChart(); renderCards(); renderMotm(); }

/* ---------------- LOAD DATA ---------------- */
function boot(rows, isDemo){
  const parsed = parseNewFormat(rows);
  if(parsed.users.length){
    SHEET = parsed;
    if(LOG_HISTORY_CSV_URL){
      Papa.parse(LOG_HISTORY_CSV_URL, {
        download:true,
        complete:(res)=>{ applyLogHistory(SHEET, res.data); finishBoot(isDemo); },
        error:()=>{ finishBoot(isDemo); } // no history saved yet — fine, just shows 0 logs
      });
    } else {
      finishBoot(isDemo);
    }
    return;
  }
  // Layout couldn't be found at all (e.g. header text got renamed) — fall
  // back to the old parser rather than showing a blank site, though this
  // shouldn't come up in normal use anymore since the Old sheet is gone.
  console.warn('SGR Host Database: New-format parsing found 0 users — falling back to the Old parser, which will likely also find nothing now that the Old sheet section is gone. This is almost certainly why logins are failing.');
  SHEET = parseSheetRows(rows);
  finishBoot(isDemo);
}
function finishBoot(isDemo){
  if(isDemo){
    console.warn('SGR Host Database: live sheet fetch failed, showing demo data. Check CONFIG.SHEET_CSV_URL.');
  }
  const remembered = loadRemembered();
  if(remembered && remembered.u && remembered.p){
    document.getElementById('login-user').value = remembered.u;
    document.getElementById('login-pass').value = remembered.p;
    attemptLogin(true); // silent — a stale/failed save shouldn't flash an error at someone who hasn't touched the form
  }
  hideLoadingScreen();
}
function hideLoadingScreen(){
  const el = document.getElementById('loading-screen');
  if(!el) return;
  el.style.opacity = '0';
  setTimeout(()=>{ el.style.display = 'none'; }, 350);
}

if(CONFIG.SHEET_CSV_URL && CONFIG.SHEET_CSV_URL.indexOf('http') === 0){
  Papa.parse(CONFIG.SHEET_CSV_URL, {
    download:true,
    complete:(res)=> boot(res.data, false),
    error:()=>{ boot(Papa.parse(DEMO_CSV).data, true); }
  });
} else {
  boot(Papa.parse(DEMO_CSV).data, true);
}
</script>
