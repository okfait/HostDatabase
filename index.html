<style>
:root{
  --bg:#0b1210; --bg-elevated:#111b17; --bg-card:#111c18; --line:#1e2d27; --line-bright:#2c443a;
  --accent:#258162; --accent-bright:#3ddc97; --accent-gold:#e8b84b; --accent-danger:#d9605a;
  --text:#f2f5f3; --text-muted:#93a89f; --text-dim:#5c6f68;
  --font-display:'Poppins',sans-serif; --font-body:'Inter',sans-serif;
}
[data-theme="light"]{ --bg:#f3f6f4; --bg-elevated:#ffffff; --bg-card:#ffffff; --line:#dfe7e2; --line-bright:#c7d5cd; --text:#0f1a16; --text-muted:#5c6f68; --text-dim:#8a998f; }
[data-theme="light"] body{ background: radial-gradient(ellipse at top, rgba(37,129,98,0.08), transparent 55%), var(--bg); }
[data-theme="light"] #login-screen{ background: repeating-linear-gradient(0deg, rgba(37,129,98,0.05) 0px, rgba(37,129,98,0.05) 1px, transparent 1px, transparent 3px), var(--bg); }
*{box-sizing:border-box;}
html{ scrollbar-width:none; -ms-overflow-style:none; }
html::-webkit-scrollbar{ display:none; width:0; height:0; }
body{ margin:0; padding:0; background: radial-gradient(ellipse at top, rgba(37,129,98,0.10), transparent 55%), var(--bg); color:var(--text); font-family:var(--font-body); min-height:100vh; -webkit-font-smoothing:antialiased; }
body::-webkit-scrollbar{ display:none; width:0; height:0; }
::selection{ background:var(--accent); color:#fff; }
@media (prefers-reduced-motion: reduce){ *{ animation-duration:0.001ms !important; transition-duration:0.001ms !important; } }
.icon{ width:18px; height:18px; flex-shrink:0; }
.eyebrow{ font-size:11px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-dim); }

.shiny-text{ background-image:linear-gradient(120deg, currentColor 0%, currentColor 35%, #ffffff 50%, currentColor 65%, currentColor 100%); background-size:220% auto; -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; animation:shineSweep 3.4s linear infinite; }
@keyframes shineSweep{ 0%{ background-position:150% center; } 100%{ background-position:-50% center; } }

.electric-wrap{ position:relative; }
.electric-canvas{ position:absolute; pointer-events:none; z-index:0; }

/* ---------- LOGIN ---------- */
#login-screen{ position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center; background: repeating-linear-gradient(0deg, rgba(37,129,98,0.035) 0px, rgba(37,129,98,0.035) 1px, transparent 1px, transparent 3px), var(--bg); overflow:hidden; }
#login-screen::before, #login-screen::after{ content:""; position:absolute; width:170vmax; height:170vmax; border-radius:50%; filter:blur(90px); pointer-events:none; will-change:transform; }
#login-screen::before{ top:-85vmax; left:-85vmax; background:radial-gradient(circle, rgba(61,220,151,0.16), transparent 62%); animation:driftA 20s ease-in-out infinite alternate; }
#login-screen::after{ bottom:-85vmax; right:-85vmax; background:radial-gradient(circle, rgba(37,129,98,0.18), transparent 62%); animation:driftB 24s ease-in-out infinite alternate; }
@keyframes driftA{ 0%{ transform:translate(0,0) scale(1); } 100%{ transform:translate(6vmax,5vmax) scale(1.08); } }
@keyframes driftB{ 0%{ transform:translate(0,0) scale(1); } 100%{ transform:translate(-6vmax,-5vmax) scale(1.08); } }
.login-card{ position:relative; z-index:1; width:min(380px, 90vw); background:var(--bg-card); border:1px solid var(--line-bright); border-radius:20px; padding:36px 30px 28px; box-shadow:0 30px 80px rgba(0,0,0,0.55); }
.login-badge{ height:104px; margin:0 auto 18px; display:flex; align-items:center; justify-content:center; }
.login-badge img{ height:100%; width:auto; max-width:220px; object-fit:contain; filter:drop-shadow(0 10px 26px rgba(0,0,0,0.45)); }
.login-title{ font-family:var(--font-display); font-weight:700; font-size:22px; text-align:center; letter-spacing:-0.01em; margin:0 0 26px; }
.field{ margin-bottom:14px; }
.field label{ display:block; font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-muted); margin-bottom:6px; }
.field input{ width:100%; padding:12px 14px; border-radius:11px; background:var(--bg-elevated); border:1px solid var(--line-bright); color:var(--text); font-family:var(--font-body); font-size:14.5px; outline:none; transition:border-color .15s, box-shadow .15s; }
.field input:focus{ border-color:var(--accent-bright); box-shadow:0 0 0 3px rgba(61,220,151,0.15); }
@keyframes onAutoFillStart{ from{ opacity:1; } to{ opacity:1; } }
@keyframes onAutoFillCancel{ from{ opacity:1; } to{ opacity:1; } }
.field input:-webkit-autofill{ animation-name:onAutoFillStart; animation-duration:0.1s; }
.field input:not(:-webkit-autofill){ animation-name:onAutoFillCancel; animation-duration:0.1s; }
#login-btn{ width:100%; margin-top:8px; padding:14px; border:none; border-radius:11px; background:linear-gradient(135deg, var(--accent-bright), var(--accent)); color:#04140d; font-family:var(--font-display); font-weight:700; font-size:15px; cursor:pointer; transition:transform .12s, box-shadow .12s; }
#login-btn:hover{ transform:translateY(-1px); box-shadow:0 8px 24px rgba(61,220,151,0.25); }
#login-error{ margin-top:12px; font-size:12.5px; color:var(--accent-danger); text-align:center; min-height:14px; }

/* ---------- APP SHELL ---------- */
#app{ display:none; }
.app-content{ max-width:1180px; margin:0 auto; padding:112px 24px 60px; }
header.top{ position:fixed; top:0; left:0; right:0; z-index:40; padding:14px 24px; background:rgba(11,18,16,0.55); -webkit-backdrop-filter:blur(18px) saturate(140%); backdrop-filter:blur(18px) saturate(140%); border-bottom:1px solid rgba(44,68,58,0.5); }
header.top .top-inner{ max-width:1180px; width:100%; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
.brand{ display:flex; align-items:center; gap:13px; }
.brand-mark{ height:46px; display:flex; align-items:center; justify-content:center; }
.brand-mark img{ height:100%; width:auto; max-width:200px; object-fit:contain; }
.brand-text .name{ font-family:var(--font-display); font-weight:700; font-size:19px; letter-spacing:-0.01em; }
.who{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.who .name{ font-size:13px; color:var(--text-muted); }
.who .name b{ color:var(--text); font-weight:600; }
#logout-btn{ background:transparent; border:1px solid var(--line-bright); color:var(--text-muted); font-size:11.5px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; padding:9px 14px; border-radius:10px; cursor:pointer; transition:.15s; font-family:var(--font-body); }
#logout-btn:hover{ border-color:var(--accent-danger); color:var(--accent-danger); }
.topnav{ display:flex; align-items:center; gap:4px; }
.topnav a{ display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:600; color:var(--text-muted); text-decoration:none; padding:8px 12px; border-radius:9px; transition:.15s; }
.topnav a:hover{ color:var(--accent-bright); background:var(--bg-elevated); }
#theme-toggle{ display:inline-flex; align-items:center; justify-content:center; width:36px; height:36px; background:var(--bg-elevated); border:1px solid var(--line-bright); color:var(--text-muted); border-radius:10px; cursor:pointer; transition:.15s; flex-shrink:0; }
#theme-toggle:hover{ border-color:var(--accent-bright); color:var(--accent-bright); }

section.section{ margin-bottom:40px; scroll-margin-top:100px; }
.section-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:10px; }
.section-title{ display:inline-flex; align-items:center; gap:8px; font-family:var(--font-display); font-weight:700; font-size:14px; letter-spacing:0.08em; text-transform:uppercase; color:var(--accent-bright); }

.logs-label{ text-align:center; font-family:var(--font-display); font-weight:800; font-size:30px; letter-spacing:0.02em; color:var(--accent-bright); margin-bottom:16px; }
.pill-wrap{ display:flex; flex-direction:column; align-items:center; gap:10px; }
.pill-track{ position:relative; width:100%; max-width:640px; height:44px; border-radius:999px; background:var(--bg-elevated); border:1px solid var(--line-bright); overflow:visible; margin:0 auto; }
.pill-fill{ position:absolute; top:0; left:0; bottom:0; width:0%; border-radius:999px; background:linear-gradient(90deg, var(--accent), var(--accent-bright)); transition:width 0.9s cubic-bezier(.2,.8,.2,1); overflow:hidden; }
.pill-value{ position:absolute; left:16px; top:0; bottom:0; display:flex; align-items:center; font-family:var(--font-display); font-weight:700; font-size:16px; color:#04140d; z-index:2; }
.pill-value.on-track{ color:var(--text); }
.pill-marker{ position:absolute; top:-20px; bottom:-20px; width:34px; margin-left:-17px; z-index:3; cursor:pointer; }
.pill-marker::before{ content:""; position:absolute; top:20px; bottom:20px; left:50%; width:2px; transform:translateX(-50%); background:var(--accent-gold); box-shadow:0 0 8px rgba(232,184,75,0.7); }
.pill-marker .marker-num{ position:absolute; top:0; left:50%; transform:translateX(-50%); font-size:12px; font-weight:700; color:var(--accent-gold); white-space:nowrap; }
.tip-box{ position:absolute; bottom:calc(100% + 12px); left:50%; transform:translateX(-50%); background:var(--bg-card); border:1px solid var(--line-bright); border-radius:10px; padding:9px 13px; font-size:12.5px; font-weight:600; white-space:nowrap; opacity:0; pointer-events:none; transition:opacity .15s, transform .15s; box-shadow:0 10px 26px rgba(0,0,0,0.4); z-index:5; }
.tip-box::after{ content:""; position:absolute; top:100%; left:50%; transform:translateX(-50%); border:6px solid transparent; border-top-color:var(--bg-card); }
.pill-marker:hover .tip-box, .pill-promo:hover .tip-box{ opacity:1; transform:translateX(-50%) translateY(-3px); }
.pill-marker .tip-box{ color:var(--accent-gold); }
.pill-promo{ position:absolute; right:0; top:-20px; bottom:-20px; display:flex; align-items:center; padding:0 16px 0 24px; font-family:var(--font-display); font-weight:700; font-size:16px; color:var(--text-muted); z-index:2; cursor:pointer; }
.pill-promo .tip-box{ color:var(--accent-bright); left:auto; right:0; transform:none; }
.pill-promo:hover .tip-box{ transform:translateY(-3px); }
.pill-caption{ font-size:12.5px; color:var(--text-dim); text-align:center; }
.quota-soon{ display:flex; align-items:center; gap:10px; font-size:13px; color:var(--text-dim); margin-top:6px; }
.dots{ display:flex; gap:4px; }
.dots span{ width:5px; height:5px; border-radius:50%; background:var(--accent-bright); animation:bob 1s ease-in-out infinite; }
.dots span:nth-child(2){ animation-delay:.15s; } .dots span:nth-child(3){ animation-delay:.3s; }
@keyframes bob{ 0%,100%{ transform:translateY(0); opacity:.4;} 50%{ transform:translateY(-4px); opacity:1;} }

.graph-controls{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.toggle-pill{ display:inline-flex; align-items:center; gap:9px; background:var(--bg-elevated); border:1px solid var(--line-bright); color:var(--text-muted); font-size:12.5px; font-weight:600; padding:9px 16px 9px 10px; border-radius:999px; cursor:pointer; transition:.15s; }
.toggle-pill .dot{ width:14px; height:14px; border-radius:50%; border:2px solid var(--line-bright); background:transparent; transition:.2s; flex-shrink:0; }
.toggle-pill:hover{ border-color:var(--line-bright); color:var(--text); }
.toggle-pill.active{ color:var(--text); border-color:var(--accent-bright); }
.toggle-pill.active .dot{ background:var(--accent-bright); border-color:var(--accent-bright); box-shadow:0 0 8px rgba(61,220,151,.6); }
.dropdown{ position:relative; }
.dropdown-toggle{ display:inline-flex; align-items:center; gap:8px; background:var(--bg-elevated); border:1px solid var(--line-bright); color:var(--text); font-size:12.5px; font-weight:600; padding:9px 16px; border-radius:999px; cursor:pointer; transition:.15s; }
.dropdown-toggle:hover{ border-color:var(--accent-bright); }
.dropdown-toggle .chev{ font-size:9px; color:var(--text-dim); transition:transform .15s; }
.dropdown.open .dropdown-toggle .chev{ transform:rotate(180deg); }
.dropdown-menu{ position:absolute; top:calc(100% + 8px); left:0; min-width:180px; max-height:260px; overflow-y:auto; background:var(--bg-card); border:1px solid var(--line-bright); border-radius:14px; padding:6px; box-shadow:0 20px 50px rgba(0,0,0,0.45); opacity:0; pointer-events:none; transform:translateY(-6px); transition:opacity .15s, transform .15s; z-index:10; }
.dropdown.open .dropdown-menu{ opacity:1; pointer-events:auto; transform:translateY(0); }
.dropdown-item{ padding:9px 12px; border-radius:9px; font-size:12.5px; font-weight:500; color:var(--text-muted); cursor:pointer; transition:.1s; }
.dropdown-item:hover{ background:var(--bg-elevated); color:var(--text); }
.dropdown-item.selected{ color:var(--accent-bright); font-weight:600; }
.chart-box{ position:relative; height:340px; margin-top:20px; }

.cards-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(230px,1fr)); gap:14px; }
.card{ position:relative; z-index:1; background:var(--bg-card); border:1px solid var(--line); border-radius:16px; padding:17px; cursor:default; transition:border-color .2s, transform .2s, box-shadow .2s; }
.card:hover{ border-color:var(--accent); transform:translateY(-3px); box-shadow:0 16px 40px rgba(0,0,0,0.35); }
.card-top{ display:flex; align-items:center; gap:11px; }
.pfp{ width:44px; height:44px; border-radius:50%; object-fit:cover; flex-shrink:0; border:2px solid var(--line-bright); background:var(--bg-elevated); }
.pfp.fallback{ display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:700; color:var(--text-muted); }
.card-name{ font-weight:700; font-size:14.5px; }
.card-rank{ font-size:11.5px; font-weight:600; color:var(--text-muted); margin-top:1px; }
.card-tags{ display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
.tag{ font-size:10px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; padding:3px 8px; border-radius:999px; }
.tag-loa{ background:rgba(232,184,75,0.15); color:var(--accent-gold); border:1px solid rgba(232,184,75,0.4); }
.tag-warn{ background:rgba(217,96,90,0.15); color:var(--accent-danger); border:1px solid rgba(217,96,90,0.4); }
.card-hr{ height:1px; background:var(--line); margin:13px 0; }
.card-info{ max-height:0; opacity:0; overflow:hidden; transition:max-height .7s cubic-bezier(.2,.8,.2,1), opacity .5s, margin .7s; }
.card:hover .card-info{ max-height:320px; opacity:1; }
.card-info ul{ margin:0 0 13px; padding-left:16px; font-size:11.5px; color:var(--text-muted); line-height:1.6; }
.card-info li{ margin-bottom:3px; }
.card-info .card-hr{ margin:0 0 13px; }
.card-logs{ font-family:var(--font-display); font-weight:700; font-size:24px; text-align:center; }
.card-logs .unit{ font-size:11px; color:var(--text-dim); font-weight:500; margin-left:6px; }
.status-danger .card-logs{ color:var(--accent-danger); }
.status-hold .card-logs{ color:var(--text); }
.status-promo .card-logs{ color:var(--accent-gold); }

.motm-card{ position:relative; z-index:1; background:var(--bg-card); border:1px solid var(--line); border-radius:16px; padding:17px; transition:border-color .2s, transform .2s, box-shadow .2s; }
.motm-card:hover{ border-color:var(--accent-gold); transform:translateY(-3px); box-shadow:0 16px 40px rgba(0,0,0,0.35); }
.motm-card-top{ display:flex; align-items:center; gap:11px; }
.motm-badge{ font-family:var(--font-display); font-weight:700; font-size:13px; color:var(--accent-gold); width:32px; height:32px; border-radius:50%; border:1px solid var(--accent-gold); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.motm-card-name{ font-weight:700; font-size:14.5px; }
.motm-card-date{ font-size:11.5px; color:var(--text-dim); margin-top:1px; }
.motm-card .card-hr{ margin:13px 0; }
.motm-card-logs{ font-family:var(--font-display); font-weight:700; font-size:24px; text-align:center; color:var(--accent-gold); }
.motm-card-logs .unit{ font-size:11px; color:var(--text-dim); font-weight:500; margin-left:6px; }

footer{ max-width:1180px; margin:0 auto; padding-top:26px; border-top:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:14px; }
.footer-text{ font-size:12px; color:var(--text-dim); line-height:1.6; }
.footer-logos{ display:flex; align-items:center; gap:10px; }
.logo-box{ background:#fff; border-radius:12px; padding:8px 10px; display:flex; align-items:center; box-shadow:0 6px 20px rgba(0,0,0,0.3); }

/* ---------------- ported ElectricBorder (canvas noise outline) ---------------- */
function attachElectricBorder(target, { color = '#3ddc97', speed = 1, chaos = 0.06, borderRadius = 16 } = {}){
  const borderOffset = 14;
  const wrap = document.createElement('div');
  wrap.className = 'electric-wrap';
  target.parentNode.insertBefore(wrap, target);
  const canvas = document.createElement('canvas');
  canvas.className = 'electric-canvas';
  wrap.appendChild(canvas);
  wrap.appendChild(target);

  const ctx = canvas.getContext('2d');
  let width = 0, height = 0, timeVal = 0, lastTime = 0, rafId = 0;

  function random(x){ return (Math.sin(x * 12.9898) * 43758.5453) % 1; }
  function noise2D(x, y){
    const i = Math.floor(x), j = Math.floor(y), fx = x - i, fy = y - j;
    const a = random(i + j * 57), b = random(i + 1 + j * 57), c = random(i + (j + 1) * 57), d = random(i + 1 + (j + 1) * 57);
    const ux = fx * fx * (3 - 2 * fx), uy = fy * fy * (3 - 2 * fy);
    return a * (1 - ux) * (1 - uy) + b * ux * (1 - uy) + c * (1 - ux) * uy + d * ux * uy;
  }
  function octavedNoise(x, octaves, lacunarity, gain, baseAmp, baseFreq, t, seed){
    let y = 0, amp = baseAmp, freq = baseFreq;
    for(let i = 0; i < octaves; i++){ y += amp * noise2D(freq * x + seed * 100, t * freq * 0.3); freq *= lacunarity; amp *= gain; }
    return y;
  }
  function cornerPt(cx, cy, r, startA, arc, p){ const a = startA + p * arc; return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) }; }
  function roundRectPt(t, left, top, w, h, r){
    const sw = w - 2 * r, sh = h - 2 * r, arc = (Math.PI * r) / 2, total = 2 * sw + 2 * sh + 4 * arc;
    let dist = t * total, acc = 0;
    if(dist <= acc + sw){ const p = (dist - acc) / sw; return { x: left + r + p * sw, y: top }; } acc += sw;
    if(dist <= acc + arc){ const p = (dist - acc) / arc; return cornerPt(left + w - r, top + r, r, -Math.PI/2, Math.PI/2, p); } acc += arc;
    if(dist <= acc + sh){ const p = (dist - acc) / sh; return { x: left + w, y: top + r + p * sh }; } acc += sh;
    if(dist <= acc + arc){ const p = (dist - acc) / arc; return cornerPt(left + w - r, top + h - r, r, 0, Math.PI/2, p); } acc += arc;
    if(dist <= acc + sw){ const p = (dist - acc) / sw; return { x: left + w - r - p * sw, y: top + h }; } acc += sw;
    if(dist <= acc + arc){ const p = (dist - acc) / arc; return cornerPt(left + r, top + h - r, r, Math.PI/2, Math.PI/2, p); } acc += arc;
    if(dist <= acc + sh){ const p = (dist - acc) / sh; return { x: left, y: top + h - r - p * sh }; } acc += sh;
    const p = (dist - acc) / arc; return cornerPt(left + r, top + r, r, Math.PI, Math.PI/2, p);
  }
  function updateSize(){
    const rect = target.getBoundingClientRect();
    width = rect.width + borderOffset * 2; height = rect.height + borderOffset * 2;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = width * dpr; canvas.height = height * dpr;
    canvas.style.width = width + 'px'; canvas.style.height = height + 'px';
    canvas.style.left = (-borderOffset) + 'px'; canvas.style.top = (-borderOffset) + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  updateSize();
  function draw(now){
    rafId = requestAnimationFrame(draw);
    if(!lastTime) lastTime = now;
    const dt = (now - lastTime) / 1000; lastTime = now;
    timeVal += dt * speed;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = color; ctx.lineWidth = 1.4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.shadowColor = color; ctx.shadowBlur = 7;
    const left = borderOffset, top = borderOffset, bw = width - 2 * borderOffset, bh = height - 2 * borderOffset;
    if(bw <= 0 || bh <= 0) return;
    const maxR = Math.min(bw, bh) / 2, r = Math.min(borderRadius, maxR);
    const perim = 2 * (bw + bh) + 2 * Math.PI * r;
    const samples = Math.max(24, Math.floor(perim / 3));
    ctx.beginPath();
    for(let i = 0; i <= samples; i++){
      const p = i / samples;
      const pt = roundRectPt(p, left, top, bw, bh, r);
      const xn = octavedNoise(p * 8, 6, 1.6, 0.7, chaos, 10, timeVal, 0);
      const yn = octavedNoise(p * 8, 6, 1.6, 0.7, chaos, 10, timeVal, 1);
      const dx = pt.x + xn * 60, dy = pt.y + yn * 60;
      if(i === 0) ctx.moveTo(dx, dy); else ctx.lineTo(dx, dy);
    }
    ctx.closePath(); ctx.stroke();
  }
  rafId = requestAnimationFrame(draw);
  const ro = new ResizeObserver(updateSize);
  ro.observe(target);
  return { destroy(){ cancelAnimationFrame(rafId); ro.disconnect(); if(wrap.parentNode){ wrap.parentNode.insertBefore(target, wrap); wrap.remove(); } } };
}
function shadeColor(hex, percent){
  const n = parseInt(hex.replace('#',''), 16);
  let r = (n >> 16) + Math.round(255 * percent / 100);
  let g = ((n >> 8) & 0xff) + Math.round(255 * percent / 100);
  let b = (n & 0xff) + Math.round(255 * percent / 100);
  r = Math.max(0, Math.min(255, r)); g = Math.max(0, Math.min(255, g)); b = Math.max(0, Math.min(255, b));
  return '#' + (0x1000000 + r*0x10000 + g*0x100 + b).toString(16).slice(1);
}
let ELECTRIC_INSTANCES = [];
function clearElectricBorders(){ ELECTRIC_INSTANCES.forEach(i=>i.destroy()); ELECTRIC_INSTANCES = []; }

function countUp(el, target, duration = 900){
  if(!el) return;
  const startTime = performance.now();
  const isInt = Number.isInteger(target);
  function tick(now){
    const p = Math.min((now - startTime) / duration, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    const val = target * eased;
    el.textContent = isInt ? Math.round(val) : val.toFixed(1);
    if(p < 1) requestAnimationFrame(tick); else el.textContent = isInt ? target : target.toFixed(1);
  }
  requestAnimationFrame(tick);
}

/* =====================================================================
   PARSING HELPERS
   ===================================================================== */
function num(v){
  if(v===undefined || v===null) return null;
  const s = String(v).trim();
  if(s==='') return null;
  const n = parseFloat(s.replace(/[^0-9.\-]/g,''));
  return isNaN(n) ? null : n;
}
function parseDate(s){
  if(!s) return null;
  const parts = String(s).trim().split('/');
  if(parts.length!==3) return null;
  const [d,m,y] = parts.map(x=>parseInt(x,10));
  if(!d||!m||!y) return null;
  const dt = new Date(y, m-1, d);
  return isNaN(dt.getTime()) ? null : dt;
}
function shortLabel(dstr){
  const p = dstr.split('/');
  if(p.length!==3) return dstr;
  return `${p[0]}/${p[1]}/${p[2].slice(-2)}`;
}
function findLabelValue(rows, label){
  const target = label.trim().toLowerCase();
  for(let r=0;r<rows.length;r++){
    const row = rows[r] || [];
    for(let c=0;c<row.length;c++){
      if((row[c]||'').toString().trim().toLowerCase() === target) return (row[c+1]||'').toString().trim();
    }
  }
  return '';
}
function findHeaderCols(rows, labels){
  for(let r=0;r<rows.length;r++){
    const row = rows[r]||[];
    const map = {};
    labels.forEach(lbl=>{
      const idx = row.findIndex(cell => (cell||'').toString().trim().toLowerCase() === lbl.toLowerCase());
      if(idx!==-1) map[lbl]=idx;
    });
    if(Object.keys(map).length === labels.length) return { rowIndex:r, cols:map };
  }
  return null;
}

/* =====================================================================
   OLD SYSTEM — wide per-date-column layout
   ===================================================================== */
function parseOldSystem(rows){
  const out = { sameRankQuota:null, promoQuota:null, motm:[], users:[] };
  if(rows.length < 2) return out;
  out.sameRankQuota = num(rows[1] && rows[1][1]);
  out.promoQuota = num(rows[2] && rows[2][1]);
  for(let r=6; r<rows.length; r++){
    const row = rows[r]; if(!row) continue;
    const uname = (row[0]||'').trim(); if(!uname) continue;
    out.motm.push({ username:uname, logs:num(row[1]), date:(row[2]||'').trim() });
  }
  const dateRows = [];
  for(let r=0; r<rows.length; r++){
    const row = rows[r]; if(!row) continue;
    const dstr = (row[4]||'').trim();
    const d = parseDate(dstr);
    if(d) dateRows.push({ r, dstr, d });
  }
  dateRows.sort((a,b)=>a.d-b.d);
  const header = rows[0] || [];
  const maxCols = Math.max(header.length, (rows[1]||[]).length, (rows[2]||[]).length, (rows[3]||[]).length);
  for(let c=5; c<maxCols; c++){
    const username = ((rows[0]||[])[c] || '').trim(); if(!username) continue;
    const password = ((rows[1]||[])[c] || '').trim();
    const pfp = ((rows[2]||[])[c] || '').trim();
    const rankName = ((rows[3]||[])[c] || '').trim();
    const entries = dateRows.map(dr => {
      const raw = num((rows[dr.r]||[])[c]);
      return { date:dr.d, dstr:dr.dstr, value: raw===null ? 0 : raw, has: raw!==null };
    });
    out.users.push({ username, password, pfp, rankName, loa:'', warnings:'', entries });
  }
  return out;
}

/* =====================================================================
   NEW SYSTEM — "Host Team Records" roster + separate LogHistory tab
   ===================================================================== */
function parseNewSystemMain(rows){
  const out = { sameRankQuota:null, promoQuota:null, motm:[], users:[] };
  out.sameRankQuota = num(findLabelValue(rows,"Logs for keeping the rank") || findLabelValue(rows,"Logs for same rank"));
  out.promoQuota = num(findLabelValue(rows,"Logs for promotion"));

  const rosterHead = findHeaderCols(rows, ["Username","Rank","Logs","Password","ProfilePic","LOA","Amount of warnings"]);
  const motmHead = findHeaderCols(rows, ["Logs","Username","Date"]);
  function findBannerRow(text, fromRow){
    const target = text.trim().toLowerCase();
    for(let r=fromRow; r<rows.length; r++){
      const row = rows[r]||[];
      if(row.some(cell => (cell||'').toString().trim().toLowerCase() === target)) return r;
    }
    return -1;
  }

  if(rosterHead){
    const otherRow = findBannerRow("Other", rosterHead.rowIndex+1);
    const endRow = otherRow!==-1 ? otherRow : (motmHead ? motmHead.rowIndex : rows.length);
    for(let r=rosterHead.rowIndex+1; r<endRow; r++){
      const row = rows[r]; if(!row) continue;
      const username = (row[rosterHead.cols.Username]||'').toString().trim();
      if(!username || username.toLowerCase()==='username') continue;
      const rankName = (row[rosterHead.cols.Rank]||'').toString().trim();
      const passwordRaw = (row[rosterHead.cols.Password]||'').toString().trim();
      const password = passwordRaw.toLowerCase()==='password' ? '' : passwordRaw;
      const pfpRaw = (row[rosterHead.cols.ProfilePic]||'').toString().trim();
      const pfp = pfpRaw.toLowerCase()==='profilepic' ? '' : pfpRaw;
      const loa = (row[rosterHead.cols.LOA]||'').toString().trim();
      const warnings = (row[rosterHead.cols['Amount of warnings']]||'').toString().trim();
      out.users.push({ username, password, pfp, rankName, loa, warnings, entries:[] });
    }
  }
  if(motmHead){
    for(let r=motmHead.rowIndex+1; r<rows.length; r++){
      const row = rows[r]; if(!row) continue;
      const uname = (row[motmHead.cols.Username]||'').toString().trim();
      if(!uname || uname.toLowerCase()==='username') continue;
      out.motm.push({ username: uname, logs: num(row[motmHead.cols.Logs]), date:(row[motmHead.cols.Date]||'').toString().trim() });
    }
  }
  out._rosterFound = !!rosterHead;
  return out;
}
function applyHistory(base, historyRows){
  const byUser = {};
  base.users.forEach(u=> byUser[u.username.toLowerCase()] = u);
  (historyRows||[]).forEach(row=>{
    if(!row || row.length<3) return;
    const dstr = (row[0]||'').toString().trim();
    const uname = (row[1]||'').toString().trim();
    if(!dstr || !uname || dstr.toLowerCase()==='date') return;
    const d = parseDate(dstr);
    if(!d) return;
    const u = byUser[uname.toLowerCase()];
    if(!u) return;
    const val = num(row[2]);
    u.entries.push({ date:d, dstr, value: val===null?0:val, has:true });
  });
  base.users.forEach(u=> u.entries.sort((a,b)=>a.date-b.date));
}

let SHEET = { sameRankQuota:null, promoQuota:null, motm:[], users:[] };
let CURRENT_USER = null;
let CHART = null;
let ONLY_ME = false;
let SELECTED_PLAYER = "";

function totalLogs(user){ return user.entries.reduce((s,e)=>s+e.value,0); }
function statusFor(total){
  const sr = SHEET.sameRankQuota, pr = SHEET.promoQuota;
  if(sr===null || pr===null) return { cls:'', label:'Quota pending' };
  if(total < sr) return { cls:'status-danger', label:'Below quota' };
  if(total < pr) return { cls:'status-hold', label:'Same rank' };
  return { cls:'status-promo', label:'Promotion' };
}
function rankFor(user){
  let name = user.rankName;
  if(!name){
    const key = Object.keys(ASSIGN).find(k=>k.toLowerCase()===user.username.toLowerCase());
    name = key ? ASSIGN[key] : '';
  }
  const idx = RANKS.findIndex(r=>r.name.toLowerCase()===String(name).toLowerCase());
  return idx===-1 ? { order:RANKS.length, rank:null } : { order:idx, rank:RANKS[idx] };
}

document.getElementById('login-form').addEventListener('submit', function(e){ e.preventDefault(); attemptLogin(); });
function attemptLogin(){
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  const match = SHEET.users.find(x => x.username.toLowerCase()===u.toLowerCase() && x.password===p);
  if(!match){ errEl.textContent = 'Username or password not recognized.'; return; }
  errEl.textContent = '';
  CURRENT_USER = match;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('who-name').textContent = match.username;
  renderAll();
}
(function(){
  const userEl = document.getElementById('login-user');
  const passEl = document.getElementById('login-pass');
  let userFilled = false, passFilled = false, fired = false;
  function maybeAutoLogin(){
    if(fired || !userFilled || !passFilled) return;
    if(!userEl.value.trim() || !passEl.value) return;
    fired = true;
    setTimeout(()=>{ if(document.getElementById('login-screen').style.display !== 'none') attemptLogin(); }, 250);
  }
  [[userEl,'user'],[passEl,'pass']].forEach(([el,which])=>{
    el.addEventListener('animationstart', (e)=>{
      if(e.animationName !== 'onAutoFillStart') return;
      if(which==='user') userFilled = true; else passFilled = true;
      maybeAutoLogin();
    });
  });
})();
document.getElementById('logout-btn').addEventListener('click', ()=>{
  CURRENT_USER = null; ONLY_ME = false; SELECTED_PLAYER='';
  document.getElementById('login-user').value=''; document.getElementById('login-pass').value='';
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
});

function renderPill(){
  const region = document.getElementById('pill-region');
  const total = totalLogs(CURRENT_USER);
  const sr = SHEET.sameRankQuota, pr = SHEET.promoQuota;
  if(sr===null || pr===null){
    const targetPct = Math.min(total*8,100);
    region.innerHTML = `<div class="pill-wrap"><div class="pill-track"><div class="pill-fill" id="pill-fill-el" style="width:0%"></div><div class="pill-value on-track" id="pill-current-num">0</div></div><div class="quota-soon">Quota <div class="dots"><span></span><span></span><span></span></div> soon</div></div>`;
    animatePillFill(targetPct);
    countUp(document.getElementById('pill-current-num'), total);
    return;
  }
  const pct = Math.min((total/pr)*100, 100);
  const markerPct = Math.min((sr/pr)*100, 100);
  region.innerHTML = `
    <div class="pill-wrap">
      <div class="pill-track">
        <div class="pill-fill" id="pill-fill-el" style="width:0%"></div>
        <div class="pill-marker" style="left:${markerPct}%"><div class="marker-num" id="pill-marker-num">0</div><div class="tip-box">You need ${sr}+ logs to keep your rank</div></div>
        <div class="pill-value ${pct>16?'':'on-track'}" id="pill-current-num">0</div>
        <div class="pill-promo"><span class="tip" id="pill-promo-num">0</span><div class="tip-box">You need ${pr} logs to get promoted</div></div>
      </div>
      <div class="pill-caption">${total>=pr ? 'Promoted this cycle' : total>=sr ? 'Rank held' : `${(pr-total).toFixed(1)} logs to promotion`}</div>
    </div>`;
  animatePillFill(pct);
  countUp(document.getElementById('pill-current-num'), total);
  countUp(document.getElementById('pill-marker-num'), sr);
  countUp(document.getElementById('pill-promo-num'), pr);
}
function animatePillFill(targetPct){
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ const el = document.getElementById('pill-fill-el'); if(el) el.style.width = targetPct + '%'; }));
}

function allDatesSorted(){
  const set = new Map();
  SHEET.users.forEach(u=>u.entries.forEach(e=>set.set(e.dstr, e.date)));
  return [...set.entries()].sort((a,b)=>a[1]-b[1]).map(x=>x[0]);
}
function lastActiveDateIndex(dates){
  for(let i=dates.length-1;i>=0;i--){
    const dstr = dates[i];
    if(SHEET.users.some(u=>u.entries.some(e=>e.dstr===dstr && e.has))) return i;
  }
  return -1;
}
function cumulativeSeries(user, dates){
  let running = 0; const map = {};
  user.entries.forEach(e=>{ map[e.dstr] = e.value; });
  return dates.map(d=>{ running += (map[d]||0); return running; });
}
const PALETTE = ['#3ddc97','#e8b84b','#7db8ff','#e88ac0','#c99bff','#ff9d6c','#6cd4d9','#d9d96c'];

function renderChart(){
  const box = document.querySelector('#graph-section .chart-box');
  if(typeof Chart === 'undefined'){
    box.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);font-size:13px;text-align:center;padding:20px;">Chart library failed to load — check your ad blocker / extensions, or your connection, then refresh.</div>';
    return;
  }
  if(!document.getElementById('logs-chart')) box.innerHTML = '<canvas id="logs-chart"></canvas>';
  const cs = getComputedStyle(document.documentElement);
  const cText = cs.getPropertyValue('--text-muted').trim() || '#93a89f';
  const cDim = cs.getPropertyValue('--text-dim').trim() || '#5c6f68';
  const cCard = cs.getPropertyValue('--bg-card').trim() || '#111c18';
  const cLine = cs.getPropertyValue('--line').trim() || '#1e2d27';
  const cLineBright = cs.getPropertyValue('--line-bright').trim() || '#2c443a';

  let dates = allDatesSorted();
  const lastIdx = lastActiveDateIndex(dates);
  dates = lastIdx >= 0 ? dates.slice(0, lastIdx + 1) : [];
  const labels = dates.map(shortLabel);

  const datasets = SHEET.users.map((u,i)=>({
    label:u.username, data:cumulativeSeries(u, dates),
    borderColor:PALETTE[i%PALETTE.length], backgroundColor:PALETTE[i%PALETTE.length],
    pointStyle:'circle', pointRadius:0, pointHoverRadius:6, borderWidth:2.5, tension:0.25,
    _baseColor:PALETTE[i%PALETTE.length]
  }));

  // Fixed axis ceiling from the FULL team, so toggling "show only me" / a
  // single player never rescales the chart.
  const overallMax = datasets.reduce((m,ds)=>Math.max(m, ...(ds.data.length?ds.data:[0])), 0);
  const yMax = Math.max(1, Math.ceil(overallMax));

  if(CHART) CHART.destroy();
  const ctx = document.getElementById('logs-chart').getContext('2d');
  CHART = new Chart(ctx, {
    type:'line',
    data:{ labels, datasets },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'nearest', intersect:true },
      plugins:{
        legend:{ labels:{ color:cText, usePointStyle:true, pointStyle:'circle', pointStyleWidth:10, font:{ family:"'Inter'", size:11, weight:600 } } },
        tooltip:{
          backgroundColor:cCard, borderColor:cLineBright, borderWidth:1, padding:10,
          titleFont:{ family:"'Inter'", size:11.5, weight:'600' }, bodyFont:{ family:"'Inter'", size:11.5 },
          callbacks:{ label:(ctx)=>` ${ctx.dataset.label}: ${ctx.formattedValue} logs` }
        }
      },
      scales:{
        y:{ beginAtZero:true, max:yMax, ticks:{ stepSize:1, color:cDim, font:{ family:"'Inter'", size:10.5 } }, grid:{ color:cLine } },
        x:{ ticks:{ color:cDim, font:{ family:"'Inter'", size:10.5 } }, grid:{ display:false } }
      },
      onHover:(evt, active)=>{
        if(!active.length){ resetOpacity(); return; }
        const idx = active[0].datasetIndex;
        CHART.data.datasets.forEach((ds,i)=>{ ds.borderColor = i===idx ? ds._baseColor : ds._baseColor+'33'; });
        CHART.update('none');
      }
    }
  });
  document.getElementById('logs-chart').addEventListener('mouseleave', resetOpacity);

  const menu = document.getElementById('dropdown-menu');
  menu.innerHTML = `<div class="dropdown-item ${SELECTED_PLAYER===''?'selected':''}" data-val="">All players</div>` +
    SHEET.users.map(u=>`<div class="dropdown-item ${SELECTED_PLAYER===u.username?'selected':''}" data-val="${u.username}">${u.username}</div>`).join('');
  menu.querySelectorAll('.dropdown-item').forEach(item=>{
    item.addEventListener('click', ()=>{
      SELECTED_PLAYER = item.dataset.val;
      document.getElementById('dropdown-toggle').innerHTML = `<span>${SELECTED_PLAYER || 'All players'} <span class="chev">▾</span></span>`;
      if(SELECTED_PLAYER){ ONLY_ME = false; document.getElementById('only-me-btn').classList.remove('active'); }
      document.getElementById('player-dropdown').classList.remove('open');
      applyFilter();
    });
  });
}
function resetOpacity(){ if(!CHART) return; CHART.data.datasets.forEach(ds=>{ ds.borderColor = ds._baseColor; }); CHART.update('none'); }
function applyFilter(){
  if(!CHART) return;
  const onlyName = ONLY_ME ? CURRENT_USER.username : SELECTED_PLAYER;
  CHART.data.datasets.forEach(ds=>{ ds.hidden = onlyName ? ds.label !== onlyName : false; });
  CHART.update();
}
document.getElementById('only-me-btn').addEventListener('click', function(){
  ONLY_ME = !ONLY_ME;
  this.classList.toggle('active', ONLY_ME);
  if(ONLY_ME){ SELECTED_PLAYER=''; document.getElementById('dropdown-toggle').innerHTML = '<span>All players <span class="chev">▾</span></span>'; }
  applyFilter();
});
document.getElementById('dropdown-toggle').addEventListener('click', (e)=>{ e.stopPropagation(); document.getElementById('player-dropdown').classList.toggle('open'); });
document.addEventListener('click', ()=>{ document.getElementById('player-dropdown').classList.remove('open'); });

const THEME_KEY = 'sgr-theme';
function setTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  try{ localStorage.setItem(THEME_KEY, t); }catch(e){}
  document.getElementById('theme-toggle').innerHTML = t === 'light' ? ICONS.sunny : ICONS.bedtime;
  if(CURRENT_USER) renderChart();
}
document.getElementById('theme-toggle').addEventListener('click', ()=>{
  const current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  setTheme(current === 'light' ? 'dark' : 'light');
});
setTheme(document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark');

function renderCards(){
  clearElectricBorders();
  const grid = document.getElementById('cards-grid');
  document.getElementById('roster-caption').textContent = `${SHEET.users.length} staff`;
  const sorted = [...SHEET.users].sort((a,b)=>{
    const ra = rankFor(a).order, rb = rankFor(b).order;
    if(ra!==rb) return ra-rb;
    return totalLogs(b) - totalLogs(a);
  });
  grid.innerHTML = sorted.map((u,i)=>{
    const total = totalLogs(u);
    const st = statusFor(total);
    const { rank } = rankFor(u);
    const initials = u.username.slice(0,2).toUpperCase();
    const pfpHtml = u.pfp ? `<img class="pfp" src="${u.pfp}" alt="${u.username}">` : `<div class="pfp fallback">${initials}</div>`;
    const infoHtml = rank ? `<div class="card-info"><ul>${rank.info.map(x=>`<li>${x}</li>`).join('')}</ul><div class="card-hr"></div></div>` : '';
    const loaActive = u.loa && u.loa.trim() && u.loa.trim().toUpperCase()!=='N/A';
    const warnActive = u.warnings && u.warnings.trim() && u.warnings.trim().toLowerCase()!=='none';
    const tagsHtml = (loaActive || warnActive) ? `<div class="card-tags">${loaActive?'<span class="tag tag-loa">On LOA</span>':''}${warnActive?`<span class="tag tag-warn">${u.warnings} warning${u.warnings.trim()==='One'?'':'s'}</span>`:''}</div>` : '';
    return `
      <div class="card ${st.cls}" data-idx="${i}" data-rank="${rank ? rank.name : ''}">
        <div class="card-top">
          ${pfpHtml}
          <div><div class="card-name">${u.username}</div><div class="card-rank">${rank ? rank.name : 'Unranked'}</div></div>
        </div>
        ${tagsHtml}
        <div class="card-hr"></div>
        ${infoHtml}
        <div class="card-logs">${total}<span class="unit">logs</span></div>
      </div>`;
  }).join('');

  const brand = CONFIG.BRAND_COLOR;
  const brandDark = shadeColor(brand, -35);
  grid.querySelectorAll('.card').forEach(card=>{
    const rankName = card.dataset.rank;
    if(rankName === 'Host Manager') ELECTRIC_INSTANCES.push(attachElectricBorder(card, { color: brand, chaos:0.06, borderRadius:16 }));
    else if(rankName === 'Host Lead') ELECTRIC_INSTANCES.push(attachElectricBorder(card, { color: brandDark, chaos:0.06, borderRadius:16 }));
  });
}

function renderMotm(){
  const el = document.getElementById('motm-list');
  if(!SHEET.motm.length){ el.innerHTML = `<div class="eyebrow">No entries yet.</div>`; return; }
  const cs = getComputedStyle(document.documentElement);
  const gold = cs.getPropertyValue('--accent-gold').trim() || '#e8b84b';
  el.innerHTML = SHEET.motm.map((m,i)=>`
    <div class="motm-card">
      <div class="motm-card-top"><div class="motm-badge">${i+1}</div><div><div class="motm-card-name">${m.username}</div><div class="motm-card-date">${m.date||''}</div></div></div>
      <div class="card-hr"></div>
      <div class="motm-card-logs">${m.logs ?? '—'}<span class="unit">logs</span></div>
    </div>`).join('');
  el.querySelectorAll('.motm-card').forEach(card=>{ ELECTRIC_INSTANCES.push(attachElectricBorder(card, { color: gold, chaos:0.06, borderRadius:16 })); });
}

function renderAll(){ renderPill(); renderChart(); renderCards(); renderMotm(); }

/* ---------------- LOAD DATA ---------------- */
Papa.parse(CONFIG.MAIN_CSV_URL, {
  download:true,
  complete:(res)=>{
    const rows = res.data;
    const mode = (findLabelValue(rows, "LogSystemWebsite") || "Old").trim().toLowerCase();
    if(mode.startsWith('new')){
      const base = parseNewSystemMain(rows);
      if(!base._rosterFound){
        console.warn('SGR Host Database: New system selected but the roster header row (Username/Rank/Logs/...) was not found — falling back to Old system parsing. Check the sheet layout.');
        SHEET = parseOldSystem(rows);
        return;
      }
      Papa.parse(CONFIG.HISTORY_CSV_URL, {
        download:true,
        complete:(hres)=>{ applyHistory(base, hres.data); SHEET = base; },
        error:()=>{ console.warn('SGR Host Database: could not load LogHistory tab yet — totals will show 0 until it exists.'); SHEET = base; }
      });
    } else {
      SHEET = parseOldSystem(rows);
    }
  },
  error:()=>{ console.error('SGR Host Database: could not load the live sheet. Check CONFIG.MAIN_CSV_URL / sharing settings.'); }
});
</script>
